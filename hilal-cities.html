<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Hilal Visibility by City</title>

<script src="/prayertimes-/js/hilal-engine.js"></script>

<style>

body{
font-family:Arial;
background:#f7f7f7;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.A{background:#d4f5d4}
.B{background:#f0f5c8}
.C{background:#f8e4b8}
.D{background:#f5c6c6}

</style>

</head>

<body>

<h2>North America Hilal Visibility</h2>

<input type="date" id="dateInput">

<table>

<thead>
<tr>
<th>City</th>
<th>Visibility</th>
<th>Category</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

const cities = [

{name:"Chicago",lat:41.8781,lon:-87.6298},
{name:"New York",lat:40.7128,lon:-74.0060},
{name:"Houston",lat:29.7604,lon:-95.3698},
{name:"Los Angeles",lat:34.0522,lon:-118.2437},
{name:"Toronto",lat:43.6532,lon:-79.3832}

]

function label(cat){

if(cat===3) return ["A","Visible to naked eye"]
if(cat===2) return ["B","Visible with optical aid"]
if(cat===1) return ["C","May be visible"]
return ["D","Not visible"]

}

function update(){

const date = new Date(
document.getElementById("dateInput").value
)

const tbody =
document.getElementById("tableBody")

tbody.innerHTML=""

cities.forEach(c=>{

const cat = odehCategory(date,c.lat,c.lon)

const lab = label(cat)

const tr = document.createElement("tr")

tr.className = lab[0]

tr.innerHTML =
`<td>${c.name}</td>
<td>${lab[1]}</td>
<td>${lab[0]}</td>`

tbody.appendChild(tr)

})

}

function setNextHijri29(){

const today = new Date()

for(let i=0;i<60;i++){

let d = new Date(today)
d.setDate(today.getDate()+i)

let h = gregorianToHijri(d)

if(h.d===29){

document.getElementById("dateInput").value =
d.toISOString().split("T")[0]

return

}}}

document
.getElementById("dateInput")
.addEventListener("change",update)

setNextHijri29()
update()

</script>

</body>
</html>
