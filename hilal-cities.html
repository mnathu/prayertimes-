<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Hilal Visibility by City</title>

<style>

body{
font-family:Arial;
background:#f7f7f7;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.A{background:#d8f3dc}
.B{background:#fff3b0}
.C{background:#ffd6a5}
.D{background:#ffadad}

</style>

</head>

<body>

<h2>North American Cities</h2>

<input type="date" id="dateInput">

<table>

<thead>
<tr>
<th>City</th>
<th>Visibility</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

/* SAME ENGINE AS MAP */

function julian(date){
return date.getTime()/86400000 + 2440587.5;
}

function sunMoonElongation(date){

const d = julian(date)-2451545;

const sun = 280.46 + 0.9856474*d;
const moon = 218.32 + 13.176396*d;

return Math.abs(moon-sun)%360;

}

function moonAltitude(lat){
return 10*Math.cos(lat*Math.PI/180);
}

function odehCategory(date,lat,lon){

const el = sunMoonElongation(date);
const alt = moonAltitude(lat);

if(el>15 && alt>8) return 3;
if(el>12 && alt>5) return 2;
if(el>9 && alt>2) return 1;

return 0;

}

/* CITIES */

const cities=[
{name:"Chicago",lat:41.8781,lon:-87.6298},
{name:"New York",lat:40.7128,lon:-74.006},
{name:"Houston",lat:29.7604,lon:-95.3698},
{name:"Los Angeles",lat:34.0522,lon:-118.2437},
{name:"Toronto",lat:43.6532,lon:-79.3832}
];

function label(cat){

if(cat===3) return "Visible";
if(cat===2) return "Optical Aid";
if(cat===1) return "Possible";
return "Not Visible";

}

function update(){

const date = new Date(
document.getElementById("dateInput").value
);

const tbody =
document.getElementById("tableBody");

tbody.innerHTML="";

cities.forEach(c=>{

const cat = odehCategory(date,c.lat,c.lon);

const tr=document.createElement("tr");

tr.className=["D","C","B","A"][cat];

tr.innerHTML=
`<td>${c.name}</td>
<td>${label(cat)}</td>`;

tbody.appendChild(tr);

});

}

document
.getElementById("dateInput")
.addEventListener("change",update);

document.getElementById("dateInput").value =
new Date().toISOString().split("T")[0];

update();

</script>

</body>
</html>
