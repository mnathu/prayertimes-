<!DOCTYPE html>
<html>
<head>
  <title>Hilal Visibility — Major U.S. Cities</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    th { background: #eee; }
  </style>
</head>

<body>

<h2>Hilal Prediction for Major U.S. Cities<br>(FCNA / Moonsighting.com Criteria)</h2>

<p><strong>Rule:</strong> Hilal is “visible” if <strong>Altitude ≥ 5°</strong> AND <strong>Elongation ≥ 8°</strong> at local sunset.  
Otherwise “not visible”.</p>

<button onclick="runPrediction()">Run Prediction</button>

<table id="resultsTable">
  <thead>
    <tr>
      <th>City</th>
      <th>Altitude (°)</th>
      <th>Elongation (°)</th>
      <th>Visibility</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
// Major U.S. cities we will evaluate
const cities = [
    { name: "New York, NY" },
    { name: "Chicago, IL" },
    { name: "Houston, TX" },
    { name: "Phoenix, AZ" },
    { name: "Los Angeles, CA" },
    { name: "Seattle, WA" },
    { name: "Miami, FL" },
    { name: "Denver, CO" },
    { name: "Atlanta, GA" },
    { name: "San Francisco, CA" }
];

// Placeholder: INSERT REAL ASTRONOMICAL DATA HERE.
// In production, replace this function with:
//  - API call
//  - Backend computation
//  - Ephemeris library results
function getAstronomicalParameters(cityName) {
    // EXAMPLE placeholder values (NOT REAL)
    // Replace with actual altitude & elongation values at local sunset.
    return {
        altitude: Math.random() * 12 - 2,   // range: -2 to 10 degrees
        elongation: Math.random() * 15      // range: 0 to 15 degrees
    };
}

// FCNA/Moonsighting.com visibility rule
function isHilalVisible(alt, elong) {
    return (alt >= 5 && elong >= 8);
}

function runPrediction() {
    const tbody = document.querySelector("#resultsTable tbody");
    tbody.innerHTML = "";

    cities.forEach(city => {
        // Get altitude & elongation for each city
        const params = getAstronomicalParameters(city.name);

        const visible = isHilalVisible(params.altitude, params.elongation)
            ? "Visible"
            : "Not Visible";

        const row = `
            <tr>
                <td>${city.name}</td>
                <td>${params.altitude.toFixed(2)}</td>
                <td>${params.elongation.toFixed(2)}</td>
                <td><strong>${visible}</strong></td>
            </tr>
        `;

        tbody.innerHTML += row;
    });
}
</script>

</body>
</html>
