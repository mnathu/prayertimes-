<style>

body{
font-family:Arial, sans-serif;

background:#f4f6f8;
color:#333;
}

nav{
background:#1f3a5f;
padding:14px;
}

nav a{
color:white;

}

.container{
max-width:1100px;
margin:auto;
padding:25px;
}

.card{

padding:20px;

box-shadow:0 2px 8px rgba(0,0,0,.06);
margin-bottom:20px;
}

#map{
height:500px;
border-radius:10px;
}

padding:12px;

}

color:#2e7d32;
}

}

}

</style>

</head>

<body>

<nav>

<a href="/">Home</a>
<a href="/annual.html">Annual Timetable</a>
<a href="/qibla.html">Qibla</a>
<a href="/halal.html">Halal Guide</a>
<a href="/hilal-forecast.html">Hilal Forecast</a>

</nav>

<div class="container">

<div class="card">

<h2>Hilal Visibility Forecast</h2>

<label>Select Date</label>
<input type="date" id="datePicker">

<p id="hijriDate" class="small"></p>

<div id="status" class="status"></div>

</div>

<div class="card">

<h3>Global Crescent Visibility</h3>

<div id="map"></div>

<p class="small">

Green — visible to naked eye  
Yellow — optical aid may help  
Orange — difficult visibility  
Red — not visible  

</p>

</div>

<div class="card">

<h3>Next Lunar Month Forecast</h3>

<div id="forecast"></div>

</div>

</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="/prayertimes-/js/astronomy-core.js"></script>
<script src="/prayertimes-/js/moon-phase.js"></script>
<script src="/prayertimes-/js/hilal-visibility.js"></script>
<script src="/prayertimes-/js/horizon-logic.js"></script>
<script src="/prayertimes-/js/hilal-map.js"></script>

<script>

/* MAP INITIALIZATION */

const map=L.map("map").setView([20,0],2)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:7,
attribution:'© OpenStreetMap'
}
).addTo(map)

let visibilityLayer=[]


function clearMap(){

visibilityLayer.forEach(l=>map.removeLayer(l))

visibilityLayer=[]

}


/* RENDER VISIBILITY GRID */

function drawVisibility(date){

clearMap()

const grid=globalVisibility(date)

grid.forEach(p=>{

let color="#e57373"

if(p.cat==="A") color="#2e7d32"
if(p.cat==="B") color="#fbc02d"
if(p.cat==="C") color="#fb8c00"

let circle=L.circle([p.lat,p.lon],{

radius:180000,
color:color,
weight:0,
fillOpacity:.35

}).addTo(map)

visibilityLayer.push(circle)

})

}


/* HIJRI DATE */

function gregorianToHijri(date){

const jd=Math.floor(date/86400000+2440587.5)

const l=jd-1948440+10632
const n=Math.floor((l-1)/10631)
const l2=l-10631*n+354

const j=(Math.floor((10985-l2)/5316))*(Math.floor((50*l2)/17719))
+(Math.floor(l2/5670))*(Math.floor((43*l2)/15238))

const l3=l2-(Math.floor((30-j)/15))*(Math.floor((17719*j)/50))
-(Math.floor(j/16))*(Math.floor((15238*j)/43))+29

const month=Math.floor((24*l3)/709)
const day=l3-Math.floor((709*month)/24)
const year=30*n+j-30

return{day,month,year}

}

const hijriMonths=[
"Muharram","Safar","Rabi I","Rabi II",
"Jumada I","Jumada II","Rajab",
"Sha'ban","Ramadan","Shawwal",
"Dhul Qa'dah","Dhul Hijjah"
]


/* LOCATION */

let userLat=29
let userLon=-95

navigator.geolocation.getCurrentPosition(pos=>{

userLat=pos.coords.latitude
userLon=pos.coords.longitude

update()

})


/* UPDATE FORECAST */

function update(){

const date=new Date(document.getElementById("datePicker").value)

if(!date) return

drawVisibility(date)


/* HIJRI DATE */

const h=gregorianToHijri(date)

document.getElementById("hijriDate").innerHTML=
`${h.day} ${hijriMonths[h.month-1]} ${h.year} AH`


/* HORIZON VISIBILITY */

const visible=horizonVisibility(date,userLat,userLon)

const status=document.getElementById("status")

status.className="status"

if(visible){

status.classList.add("visible")

status.innerHTML=
"Crescent may be visible after sunset within your horizon."

}

else{

status.classList.add("notvisible")

status.innerHTML=
"Crescent is not expected to be visible from your horizon."

}


/* NEXT MONTH FORECAST */

const forecast=forecastNextMonth(userLat,userLon)

if(forecast){

document.getElementById("forecast").innerHTML=

`Observation night: ${forecast.observation.toDateString()}<br>
Possible first day of next lunar month: ${forecast.start.toDateString()}`

}

}


/* DEFAULT DATE */

const today=new Date()

document.getElementById("datePicker").value=
today.toISOString().split("T")[0]

document.getElementById("datePicker")
.addEventListener("change",update)

update()

</script>

</body>
</html>
