<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Hilal Forecast</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="/prayertimes-/js/hilal-engine.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f7f7f7;
}

header{
padding:14px;
text-align:center;
font-weight:600;
}

#map{
height:60vh;
}

.controls{
padding:10px;
text-align:center;
}

.legend{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
font-size:12px;
}

.legend div{
padding:6px 10px;
border-radius:8px;
}

.A{background:#d4f5d4}
.B{background:#f0f5c8}
.C{background:#f8e4b8}
.D{background:#f5c6c6}

</style>

</head>

<body>

<header>Hilal Visibility Forecast</header>

<div class="controls">

<input type="date" id="dateInput">

</div>

<div id="map"></div>

<div class="legend">
<div class="A">A Visible</div>
<div class="B">B Optical Aid</div>
<div class="C">C Possible</div>
<div class="D">D Not Visible</div>
</div>

<script>

const map = L.map("map").setView([20,0],2);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:6}
).addTo(map);

const layer = L.layerGroup().addTo(map);

function update(){

layer.clearLayers()

const date = new Date(
document.getElementById("dateInput").value
)

for(let lat=-60; lat<=60; lat+=5){
for(let lon=-180; lon<=180; lon+=5){

const cat = odehCategory(date,lat,lon)

let color =
cat===3?"#2ecc71":
cat===2?"#f1c40f":
cat===1?"#e67e22":
"#e74c3c"

L.circle([lat,lon],{
radius:300000,
color,
fillOpacity:0.35,
weight:0
}).addTo(layer)

}}

}

function setNextHijri29(){

const today = new Date()

for(let i=0;i<60;i++){

let d = new Date(today)
d.setDate(today.getDate()+i)

let h = gregorianToHijri(d)

if(h.d===29){

document.getElementById("dateInput").value =
d.toISOString().split("T")[0]

return

}}}

document
.getElementById("dateInput")
.addEventListener("change",update)

setNextHijri29()
update()

</script>

</body>
</html>
