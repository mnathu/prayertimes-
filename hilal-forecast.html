<div class="container">

<div class="card">

<h2>Hilal Visibility Forecast</h2>

<label>Select Date:</label>
<input type="date" id="datePicker">

<p class="small">
The visibility curves below estimate crescent visibility after sunset based on astronomical parameters.
</p>

<div id="status" class="status"></div>

</div>


<div class="card">

<h3>Global Visibility Curves</h3>

<canvas id="visibilityMap"></canvas>

<p class="small">

Green — visible to naked eye  
Yellow — optical aid likely required  
Red — not visible  

</p>

</div>

</div>

<script src="/prayertimes-/js/hilal-engine.js"></script>

<script>

/* default date = next 29th Hijri approx */

function nextHijri29(){

const now=new Date()

const approx=new Date(now)

approx.setDate(now.getDate()+15)

return approx.toISOString().split("T")[0]

}

document.getElementById("datePicker").value=nextHijri29()

updateForecast()


document.getElementById("datePicker").addEventListener("change",updateForecast)



function updateForecast(){

const date=new Date(document.getElementById("datePicker").value)

const lat=29
const lon=-95

const result=hilalVisibility(date,lat,lon)

const status=document.getElementById("status")

status.className="status"

if(result.category==="A"){

status.classList.add("visible")
status.innerHTML=`Likely visible after sunset based on your horizon.<br>
Moon age: ${result.age.toFixed(1)} hrs<br>
Moonset lag: ${result.lag.toFixed(1)} min`

}

else if(result.category==="B"){

status.classList.add("optical")
status.innerHTML=`May require optical aid depending on atmospheric conditions.<br>
Moon age: ${result.age.toFixed(1)} hrs<br>
Moonset lag: ${result.lag.toFixed(1)} min`

}

else{

status.classList.add("notvisible")
status.innerHTML=`Not expected to be visible after sunset.<br>
Moon age: ${result.age.toFixed(1)} hrs<br>
Moonset lag: ${result.lag.toFixed(1)} min`

}

drawVisibilityCurves(date)

}


/* VISIBILITY MAP */

function drawVisibilityCurves(date){

const canvas=document.getElementById("visibilityMap")

const ctx=canvas.getContext("2d")

canvas.width=900
canvas.height=450

ctx.clearRect(0,0,900,450)


/* draw background */

ctx.fillStyle="#eef2f5"
ctx.fillRect(0,0,900,450)


/* draw curves */

drawCurve(ctx,8,"#4caf50")   // visible
drawCurve(ctx,5,"#fbc02d")   // optical
drawCurve(ctx,2,"#e57373")   // not visible

}


/* simplified curve */

function drawCurve(ctx,altitude,color){

ctx.beginPath()

ctx.strokeStyle=color
ctx.lineWidth=2

for(let lon=-180;lon<=180;lon++){

const x=(lon+180)*2.5

const y=220+(Math.sin(lon/40)*altitude*5)

if(lon===-180){

ctx.moveTo(x,y)

}else{

ctx.lineTo(x,y)

}

}

ctx.stroke()

}

</script>
