<style>

body{
  font-family:system-ui;
  margin:0;
  background:#f4f6fb;
}

nav{
  background:#0A166C;
  color:white;
  padding:12px;
  text-align:center;

nav a{
  color:white;
  margin:0 12px;

  padding:12px;

  height:60vh;
  width:100%;
}

  display:flex;

  width:14px;

<body>

<nav>
index.htmlHome</a>

</nav>

<div id="controls">

<h3>Global Crescent Visibility</h3>

<input type="date" id="dateInput">
<p><strong>Hijri Date:</strong> <span id="hijriOutput"></span></p>

<div class="legend">
  <div><span class="dot green"></span>Visible</div>
  <div><span class="dot yellow"></span>Borderline</div>
  <div><span class="dot red"></span>Not Visible</div>
</div>

</div>

<div id="map"></div>


<script>

/* ==============================
   MAP INIT
============================== */

let map;
let layer;

document.addEventListener("DOMContentLoaded", function() {
  
  map = L.map("map").setView([20,0], 2);

  // 🌍 Online tile provider
  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {attribution:"© OpenStreetMap"}
  ).addTo(map);

  layer = L.layerGroup().addTo(map);

  initDate();
});


/* ==============================
   DATE CONTROL
============================== */

function initDate(){

  const picker = document.getElementById("dateInput");
  const today = new Date();

  picker.value = today.toISOString().split("T")[0];
  updateHijri(today);

  draw(today);

  picker.addEventListener("change", () => {
    const dt = new Date(picker.value);
    updateHijri(dt);
    draw(dt);
  });
}


/* ==============================
   TABULAR HIJRI DATE
============================== */

const HIJRI_MONTHS = [
  "Muharram","Safar","Rabiʿ I","Rabiʿ II","Jumada I","Jumada II",
  "Rajab","Shaʿban","Ramadan","Shawwal","Dhul-Qaʿdah","Dhul-Hijjah"
];

function gregToHijri(g){
  var day=g.getUTCDate(),
      month=g.getUTCMonth()+1,
      year=g.getUTCFullYear();

  var m=month, y=year;
  if(m<3){ y--; m+=12; }

  var a=Math.floor(y/100);
  var b=2 - a + Math.floor(a/4);

  var jd=Math.floor(365.25*(y+4716))
        + Math.floor(30.6001*(m+1))
        + day + b - 1524.5;

  var l=jd - 1948440 + 10632;
  var n=Math.floor((l-1)/10631);
  l=l - 10631*n + 354;

  var j=(Math.floor((10985-l)/5316))* (Math.floor((50*l)/17719))
        +(Math.floor(l/5670))* (Math.floor((43*l)/15238));

  l = l - (Math.floor((30-j)/15))* (Math.floor((17719*j)/50))
        - (Math.floor(j/16))* (Math.floor((15238*j)/43)) + 29;

  var mHij=Math.floor((24*l)/709);
  var dHij=l - Math.floor((709*mHij)/24);
  var yHij=30*n + j - 30;

  return {hDay:dHij, hMonth:mHij, hYear:yHij};
}

function updateHijri(date){
  const h = gregToHijri(new Date(Date.UTC(
    date.getFullYear(), date.getMonth(), date.getDate()
  )));
  document.getElementById("hijriOutput").textContent =
      `${HIJRI_MONTHS[h.hMonth-1]} ${h.hDay}`;
}


/* ==============================
   ASTRONOMY HELPERS
============================== */

const d2r = d => d*Math.PI/180;
const norm360 = x => (x%360+360)%360;

function sunLong(jd){
  const T=(jd-2451545)/36525;
  const L0=norm360(280.46646+36000.76983*T);
  const M =norm360(357.52911+35999.05029*T);
  const C = 1.914602*Math.sin(d2r(M)) + 0.019993*Math.sin(d2r(2*M));
  return L0+C;
}

function moonLong(jd){
  const T=(jd-2451545)/36525;
  const L1=norm360(218.316+481267.8813*T);
  const M =norm360(134.963+477198.8676*T);
  return norm360(L1 + 6.289*Math.sin(d2r(M)));
}

function julian(date){
  return date/86400000 + 2440587.5;
}

function elongation(jd){
  let s=sunLong(jd);
  let m=moonLong(jd);

  let E=Math.abs(norm360(m-s));
  if(E>180) E=360-E;
  return E;
}

function illumination(jd){
  return (1 - Math.cos(d2r(elongation(jd))))/2;
}


/* ==============================
   VISIBILITY MODEL
============================== */

function visibility(illum,el){
  const pct = illum*100;
  const alt = el * 0.8;  // crude proxy

  if(pct>=1 && el>=10 && alt>=10) return "green";
  if(pct>=0.5 && el>=7 && alt>=5) return "yellow";
  return "red";
}


/* ==============================
   DRAW MAP
============================== */

function draw(date){

  layer.clearLayers();

  const jd = julian(date);

  for(let lat=-60; lat<=60; lat+=5){
    for(let lon=-180; lon<=180; lon+=5){

      let illum = illumination(jd);
      let el = elongation(jd);
      let color = visibility(illum,el);

      L.circleMarker([lat,lon],{
        radius:3,
        color:color,
        fillColor:color,
        fillOpacity:0.75
      }).addTo(layer);

    }
  }
}

</script>

</body>
</html>
