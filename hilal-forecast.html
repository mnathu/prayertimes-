<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hilal Visibility Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#f4f6fb;
}

nav{
background:#0A166C;
color:white;
padding:12px;
text-align:center;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
}

#controls{
padding:12px;
text-align:center;
background:white;
border-bottom:1px solid #ddd;
}

#map{
height:60vh;
width:100%;
}

.legend{
display:flex;
justify-content:center;
gap:16px;
margin-top:10px;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
display:inline-block;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="annual.html">Annual Timetable</a>
<a href="qibla.html">Qibla Locator</a>
<a href="halal.html">Halal Guide</a>
</nav>

<div id="controls">

<h3>Global Crescent Visibility</h3>

<input type="date" id="dateInput">

<div class="legend">
<div><span class="dot green"></span> Visible</div>
<div><span class="dot yellow"></span> Borderline</div>
<div><span class="dot red"></span> Not Visible</div>
</div>

</div>

<div id="map"></div>

<script>

/* ===============================
MAP
=============================== */

const map=L.map("map").setView([20,0],2)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map)

let layer=L.layerGroup().addTo(map)

/* ===============================
MATH HELPERS
=============================== */

const d2r=d=>d*Math.PI/180
const r2d=r=>r*180/Math.PI
const norm360=x=>(x%360+360)%360

/* ===============================
JULIAN DATE
=============================== */

function jdFromDate(d){

const y=d.getUTCFullYear()
const m=d.getUTCMonth()+1
const dy=d.getUTCDate()

let Y=y
let M=m

if(M<=2){Y--;M+=12}

const A=Math.floor(Y/100)
const B=2-A+Math.floor(A/4)

return Math.floor(365.25*(Y+4716))
+Math.floor(30.6001*(M+1))
+dy+B-1524.5

}

/* ===============================
SUN
=============================== */

function sunLong(jd){

const T=(jd-2451545)/36525

const L0=norm360(280.46646+36000.76983*T)

const M=norm360(357.52911+35999.05029*T)

const C=
1.914602*Math.sin(d2r(M))+
0.019993*Math.sin(d2r(2*M))

return L0+C

}

/* ===============================
MOON
=============================== */

function moonLong(jd){

const T=(jd-2451545)/36525

const L1=norm360(218.316+481267.8813*T)
const M=norm360(134.963+477198.8676*T)

return norm360(
L1+
6.289*Math.sin(d2r(M))
)

}

/* ===============================
ELONGATION
=============================== */

function elongationDeg(jd){

const s=sunLong(jd)
const m=moonLong(jd)

let E=Math.abs(norm360(m-s))

if(E>180)E=360-E

return E

}

/* ===============================
ILLUMINATION
=============================== */

function illumination(jd){

return (1-Math.cos(d2r(elongationDeg(jd))))/2

}

/* ===============================
SUNSET
=============================== */

function sunsetUTC(date,lat,lon){

const N=Math.floor(
(Date.UTC(date.getUTCFullYear(),date.getUTCMonth(),date.getUTCDate())
-Date.UTC(date.getUTCFullYear(),0,0))/86400000
)

const lngHour=lon/15
const t=N+(18-lngHour)/24

const M=(0.9856*t)-3.289

const L=norm360(
M+
1.916*Math.sin(d2r(M))+
282.634
)

const RA=r2d(Math.atan(0.91764*Math.tan(d2r(L))))/15

const sinDec=0.39782*Math.sin(d2r(L))
const cosDec=Math.cos(Math.asin(sinDec))

const cosH=(Math.cos(d2r(90.833))-sinDec*Math.sin(d2r(lat)))
/(cosDec*Math.cos(d2r(lat)))

if(cosH>1)return null

const H=r2d(Math.acos(cosH))/15

let UT=(H+RA-0.06571*t-6.622)%24

if(UT<0)UT+=24

return new Date(Date.UTC(
date.getUTCFullYear(),
date.getUTCMonth(),
date.getUTCDate(),
Math.floor(UT),
Math.floor((UT%1)*60)
))

}

/* ===============================
ALTITUDE
=============================== */

function moonAltitude(jd,lat){

const el=elongationDeg(jd)

return el*0.8

}

/* ===============================
VISIBILITY
=============================== */

function visibility(illum,el,alt){

const pct=illum*100

if(pct>=1 && el>=10 && alt>=10) return "green"

if(pct>=0.5 && el>=7 && alt>=5) return "yellow"

return "red"

}

/* ===============================
DRAW MAP
=============================== */

function draw(date){

layer.clearLayers()

for(let lat=-60;lat<=60;lat+=5){

for(let lon=-180;lon<=180;lon+=5){

const jd=jdFromDate(date)

const illum=illumination(jd)

const el=elongationDeg(jd)

const alt=el*0.8

const color=visibility(illum,el,alt)

L.circleMarker([lat,lon],{
radius:3,
color:color,
fillOpacity:.7
}).addTo(layer)

}

}

}

/* ===============================
DATE CONTROL
=============================== */

const picker=document.getElementById("dateInput")

const today=new Date()

picker.value=today.toISOString().split("T")[0]

draw(today)

picker.addEventListener("change",()=>{

draw(new Date(picker.value))

})

</script>

</body>
</html>
