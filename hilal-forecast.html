<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crescent Visibility Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#f5f6fb;
}

nav{
background:#0A166C;
color:white;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
}

#controls{
background:white;
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

#map{
height:65vh;
width:100%;
}

.legend{
margin-top:10px;
display:flex;
justify-content:center;
gap:20px;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
display:inline-block;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="annual.html">Annual Timetable</a>
<a href="qibla.html">Qibla Locator</a>
<a href="halal.html">Halal Guide</a>
</nav>

<div id="controls">

<h3>Crescent Visibility (North America)</h3>

<input type="date" id="dateInput">

<div class="legend">
<div><span class="dot green"></span>Likely Visible</div>
<div><span class="dot yellow"></span>Borderline</div>
<div><span class="dot red"></span>Unlikely</div>
</div>

</div>

<div id="map"></div>

<script>

/* ===============================
CITY LIST (Your Original)
=============================== */

const CITIES = [

{ name:"Minneapolis, MN", lat:44.9778, lon:-93.2650 },
{ name:"Orlando, FL", lat:28.5383, lon:-81.3792 },
{ name:"New York, NY", lat:40.7128, lon:-74.0060 },
{ name:"Chicago, IL", lat:41.8781, lon:-87.6298 },
{ name:"Houston, TX", lat:29.7604, lon:-95.3698 },
{ name:"Phoenix, AZ", lat:33.4484, lon:-112.0740 },
{ name:"Los Angeles, CA", lat:34.0522, lon:-118.2437 },
{ name:"Denver, CO", lat:39.7392, lon:-104.9903 },
{ name:"Miami, FL", lat:25.7617, lon:-80.1918 },
{ name:"Seattle, WA", lat:47.6062, lon:-122.3321 },
{ name:"Toronto, ON", lat:43.6532, lon:-79.3832 },
{ name:"Vancouver, BC", lat:49.2827, lon:-123.1207 }

]

/* ===============================
MAP
=============================== */

const map=L.map("map").setView([39,-98],4)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map)

let layer=L.layerGroup().addTo(map)

/* ===============================
ASTRONOMY HELPERS
=============================== */

const d2r=d=>d*Math.PI/180
const norm360=x=>(x%360+360)%360

function julian(date){
return date/86400000+2440587.5
}

function sunLong(jd){

const T=(jd-2451545)/36525
const L0=norm360(280.46646+36000.76983*T)
const M=norm360(357.52911+35999.05029*T)

return L0+
1.914602*Math.sin(d2r(M))+
0.019993*Math.sin(d2r(2*M))

}

function moonLong(jd){

const T=(jd-2451545)/36525

const L1=norm360(218.316+481267.8813*T)
const M=norm360(134.963+477198.8676*T)

return norm360(
L1+
6.289*Math.sin(d2r(M))
)

}

function elongation(jd){

let s=sunLong(jd)
let m=moonLong(jd)

let E=Math.abs(norm360(m-s))
if(E>180)E=360-E

return E

}

function illumination(jd){

return (1-Math.cos(d2r(elongation(jd))))/2

}

/* ===============================
VISIBILITY MODEL
=============================== */

function visibility(illum,el){

const pct=illum*100

if(pct>=1 && el>=10)
return {color:"green",text:"Likely Visible"}

if(pct>=0.5 && el>=7)
return {color:"yellow",text:"Borderline"}

return {color:"red",text:"Unlikely"}

}

/* ===============================
Moon Altitude
=============================== */

function moonAltitude(jd,lat,lon){

const GMST=(18.697374558 + 24.06570982441908*(jd-2451545)) % 24
const LST = GMST + lon/15

const lam=moonLong(jd)
const eps=23.439

const dec = Math.asin(Math.sin(d2r(eps))*Math.sin(d2r(lam)))
const RA  = Math.atan2(
Math.sin(d2r(lam))*Math.cos(d2r(eps)),
Math.cos(d2r(lam))
)

const HA = (LST*15*d2r(1)) - RA

return Math.asin(
Math.sin(d2r(lat))*Math.sin(dec) +
Math.cos(d2r(lat))*Math.cos(dec)*Math.cos(HA)
) * 180/Math.PI

}

/* ===============================
sunsetUTC
=============================== */

function sunsetUTC(gDate, lat, lon){

const N = Math.floor(
(Date.UTC(gDate.getUTCFullYear(),gDate.getUTCMonth(),gDate.getUTCDate())
- Date.UTC(gDate.getUTCFullYear(),0,0))/86400000
)

const lngHour = lon/15
const t = N + (18 - lngHour)/24

const M=(0.9856*t)-3.289

const L=norm360(
M +
1.916*Math.sin(d2r(M)) +
0.020*Math.sin(d2r(2*M)) +
282.634
)

const RA = Math.atan(0.91764*Math.tan(d2r(L))) * 180/Math.PI

const sinDec=0.39782*Math.sin(d2r(L))
const cosDec=Math.cos(Math.asin(sinDec))

const cosH=(Math.cos(d2r(90.833)) - sinDec*Math.sin(d2r(lat)))
/(cosDec*Math.cos(d2r(lat)))

if(cosH>1)return null

const H=Math.acos(cosH)*180/Math.PI/15

let UT=(H + RA/15 - 0.06571*t - 6.622) % 24

if(UT<0)UT+=24

return new Date(Date.UTC(
gDate.getUTCFullYear(),
gDate.getUTCMonth(),
gDate.getUTCDate(),
Math.floor(UT),
Math.floor((UT%1)*60)
))

}

  
/* ===============================
DRAW MAP
=============================== */

function draw(date){

layer.clearLayers()

CITIES.forEach(city=>{

const jd=julian(date)

const illum=illumination(jd)
const el=elongation(jd)

const ss = sunsetUTC(date, city.lat, city.lon)

let alt20=0
let alt30=0
let alt40=0

if(ss){

const t20=new Date(ss.getTime()+20*60000)
const t30=new Date(ss.getTime()+30*60000)
const t40=new Date(ss.getTime()+40*60000)

alt20=moonAltitude(julian(t20), city.lat, city.lon)
alt30=moonAltitude(julian(t30), city.lat, city.lon)
alt40=moonAltitude(julian(t40), city.lat, city.lon)

}

const pct = illum*100
const maxAlt = Math.max(alt20,alt30,alt40)

let color="red"
let text="Unlikely"

if(pct>=1 && el>=10 && maxAlt>=10){
color="green"
text="Likely Visible"
}
else if(pct>=0.5 && el>=7 && maxAlt>=5){
color="yellow"
text="Borderline"
}

L.circleMarker([city.lat,city.lon],{
radius:8,
color:color,
fillOpacity:0.8
})
.addTo(layer)
.bindPopup(
"<b>"+city.name+"</b><br>"+
"Illum: "+pct.toFixed(2)+"%<br>"+
"Elong: "+el.toFixed(2)+"°<br>"+
"Alt 20m: "+alt20.toFixed(1)+"°<br>"+
"Alt 30m: "+alt30.toFixed(1)+"°<br>"+
"Alt 40m: "+alt40.toFixed(1)+"°<br>"+
"Visibility: "+text
)

})

}

/* ===============================
DATE CONTROL
=============================== */

const picker=document.getElementById("dateInput")

const today=new Date()

picker.value=today.toISOString().split("T")[0]

draw(today)

picker.addEventListener("change",()=>{
draw(new Date(picker.value))
})

</script>

</body>
</html>
