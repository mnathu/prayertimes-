<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hilal Visibility Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#f4f6fb;
}

nav{
background:#0A166C;
color:white;
padding:12px;
text-align:center;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
}

#controls{
padding:12px;
text-align:center;
background:white;
border-bottom:1px solid #ddd;
}

#map{
height:60vh;
width:100%;
}

.legend{
display:flex;
justify-content:center;
gap:16px;
margin-top:10px;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
display:inline-block;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="annual.html">Annual Timetable</a>
<a href="qibla.html">Qibla Locator</a>
<a href="halal.html">Halal Guide</a>
</nav>

<div id="controls">

<h3>Global Crescent Visibility</h3>

<input type="date" id="dateInput">

<div class="legend">
<div><span class="dot green"></span>Visible</div>
<div><span class="dot yellow"></span>Borderline</div>
<div><span class="dot red"></span>Not Visible</div>
</div>

</div>

<div id="map"></div>

<script>

/* ==============================
MAP INIT
============================== */

let map
let layer

window.onload=function(){

map=L.map("map").setView([20,0],2)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map)

layer=L.layerGroup().addTo(map)

initDate()

}

/* ==============================
DATE CONTROL
============================== */

function initDate(){

const picker=document.getElementById("dateInput")

const today=new Date()

picker.value=today.toISOString().split("T")[0]

draw(today)

picker.addEventListener("change",()=>{
draw(new Date(picker.value))
})

}

/* ==============================
ASTRONOMY HELPERS
============================== */

const d2r=d=>d*Math.PI/180
const norm360=x=>(x%360+360)%360

function sunLong(jd){

const T=(jd-2451545)/36525

const L0=norm360(280.46646+36000.76983*T)

const M=norm360(357.52911+35999.05029*T)

const C=
1.914602*Math.sin(d2r(M))+
0.019993*Math.sin(d2r(2*M))

return L0+C

}

function moonLong(jd){

const T=(jd-2451545)/36525

const L1=norm360(218.316+481267.8813*T)
const M=norm360(134.963+477198.8676*T)

return norm360(
L1+
6.289*Math.sin(d2r(M))
)

}

function julian(date){

return date/86400000+2440587.5

}

function elongation(jd){

let s=sunLong(jd)
let m=moonLong(jd)

let E=Math.abs(norm360(m-s))

if(E>180)E=360-E

return E

}

function illumination(jd){

return (1-Math.cos(d2r(elongation(jd))))/2

}

/* ==============================
VISIBILITY MODEL
============================== */

function visibility(illum,el){

const pct=illum*100

const alt=el*0.8

if(pct>=1 && el>=10 && alt>=10)
return "green"

if(pct>=0.5 && el>=7 && alt>=5)
return "yellow"

return "red"

}

/* ==============================
DRAW MAP
============================== */

function draw(date){

layer.clearLayers()

const jd=julian(date)

for(let lat=-60;lat<=60;lat+=5){

for(let lon=-180;lon<=180;lon+=5){

let illum=illumination(jd)

let el=elongation(jd)

let color=visibility(illum,el)

L.circleMarker([lat,lon],{
radius:3,
color:color,
fillOpacity:.7
}).addTo(layer)

}

}

}

</script>

</body>
</html>
