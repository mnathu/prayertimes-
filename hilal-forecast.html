<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hilal Forecast | PrayerTimes</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

nav{
background:#1f3a5f;
padding:14px;
}

nav a{
color:white;
margin-right:20px;
text-decoration:none;
font-weight:500;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.06);
margin-bottom:20px;
}

#map{
height:500px;
border-radius:10px;
}

.status{
padding:10px;
margin-top:12px;
border-radius:8px;
}

.visible{
background:#e8f5e9;
color:#2e7d32;
}

.optical{
background:#fff8e1;
color:#8d6e00;
}

.notvisible{
background:#fdecea;
color:#b71c1c;
}

</style>

</head>

<body>

<nav>
<a href="/">Home</a>
<a href="/annual.html">Annual Timetable</a>
<a href="/qibla.html">Qibla</a>
<a href="/halal.html">Halal Guide</a>
<a href="/hilal-forecast.html">Hilal Forecast</a>
</nav>

<div class="container">

<div class="card">

<h2>Hilal Visibility Forecast</h2>

<label>Select Date</label>
<input type="date" id="datePicker">

<p id="hijriDate" style="color:#666;font-size:14px;margin-top:6px;"></p>

<div id="status" class="status"></div>

</div>

<div class="card">

<h3>Global Visibility Map</h3>

<div id="map"></div>

<p style="font-size:14px;color:#777">

Green — visible to naked eye  
Yellow — optical aid may be required  
Red — not visible  

</p>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/prayertimes-/js/hilal-engine.js"></script>

<script>

/* initialize map */

const map = L.map('map').setView([20,0],2)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:7,
attribution:'© OpenStreetMap'
}
).addTo(map)


let curves=[]

function clearCurves(){

curves.forEach(c=>map.removeLayer(c))
curves=[]

}

/* draw simplified visibility bands */

function drawCurve(lat,color){

let points=[]

for(let lon=-180; lon<=180; lon+=2){

points.push([lat + Math.sin(lon/40)*5 , lon])

}

let curve=L.polyline(points,{
color:color,
weight:2,
opacity:0.8
})

curve.addTo(map)

curves.push(curve)

}


function updateForecast(){

clearCurves()

drawCurve(25,"#4caf50")   // visible
drawCurve(10,"#fbc02d")   // optical
drawCurve(-5,"#e57373")   // not visible

const result=hilalVisibility(new Date(),29,-95)

const status=document.getElementById("status")

status.className="status"

if(result.category==="A"){

status.classList.add("visible")
status.innerHTML=`Likely visible after sunset based on your horizon.<br>
Moon age: ${result.age.toFixed(1)} hrs<br>
Moonset lag: ${result.lag.toFixed(1)} minutes`

}

else if(result.category==="B"){

status.classList.add("optical")
status.innerHTML=`Optical aid may be required depending on conditions.<br>
Moon age: ${result.age.toFixed(1)} hrs<br>
Moonset lag: ${result.lag.toFixed(1)} minutes`

}

else{

status.classList.add("notvisible")
status.innerHTML=`Not expected to be visible.<br>
Moon age: ${result.age.toFixed(1)} hrs<br>
Moonset lag: ${result.lag.toFixed(1)} minutes`

}

}


document.getElementById("datePicker").addEventListener("change",updateForecast)

updateForecast()

</script>

</body>
</html>
