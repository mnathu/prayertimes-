<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hilal Forecast</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,.06);
}

#map{
height:500px;
}

.status{
padding:12px;
border-radius:8px;
margin-top:10px;
}

.visible{background:#e8f5e9;color:#2e7d32;}
.notvisible{background:#fdecea;color:#b71c1c;}

.small{font-size:14px;color:#666}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Hilal Visibility Forecast</h2>

<input type="date" id="datePicker">

<p id="hijriDate" class="small"></p>

<div id="status" class="status"></div>

</div>

<div class="card">

<h3>Global Crescent Visibility</h3>

<div id="map"></div>

</div>

<div class="card">

<h3>Next Lunar Month Forecast</h3>

<div id="forecast"></div>

</div>

</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- YOUR ENGINE FILES -->
<script src="js/astronomy-core.js"></script>
<script src="js/moon-phase.js"></script>
<script src="js/hilal-visibility.js"></script>
<script src="js/horizon-logic.js"></script>
<script src="js/hilal-map.js"></script>


<script>

/* verify engines loaded */

console.log("astronomy-core:",typeof julianDay)
console.log("visibility engine:",typeof odehCategory)
console.log("horizon logic:",typeof horizonVisibility)
console.log("global grid:",typeof globalVisibility)


/* MAP */

const map=L.map("map").setView([20,0],2)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:6}
).addTo(map)

let mapLayer=[]


function clearMap(){

mapLayer.forEach(l=>map.removeLayer(l))
mapLayer=[]

}


/* draw visibility grid */

function drawVisibility(date){

if(typeof globalVisibility!=="function"){
console.error("globalVisibility() missing")
return
}

clearMap()

const grid=globalVisibility(date)

grid.forEach(p=>{

let color="#e57373"

if(p.cat==="A") color="#2e7d32"
if(p.cat==="B") color="#fbc02d"
if(p.cat==="C") color="#fb8c00"

const c=L.circle([p.lat,p.lon],{

radius:200000,
color:color,
weight:0,
fillOpacity:.35

}).addTo(map)

mapLayer.push(c)

})

}


/* Hijri conversion */

function gregorianToHijri(date){

const jd=Math.floor(date/86400000+2440587.5)

const l=jd-1948440+10632
const n=Math.floor((l-1)/10631)
const l2=l-10631*n+354

const j=(Math.floor((10985-l2)/5316))*(Math.floor((50*l2)/17719))
+(Math.floor(l2/5670))*(Math.floor((43*l2)/15238))

const l3=l2-(Math.floor((30-j)/15))*(Math.floor((17719*j)/50))
-(Math.floor(j/16))*(Math.floor((15238*j)/43))+29

const month=Math.floor((24*l3)/709)
const day=l3-Math.floor((709*month)/24)
const year=30*n+j-30

return{day,month,year}

}

const hijriMonths=[
"Muharram","Safar","Rabi I","Rabi II",
"Jumada I","Jumada II","Rajab",
"Sha'ban","Ramadan","Shawwal",
"Dhul Qa'dah","Dhul Hijjah"
]


/* user location */

let userLat=40
let userLon=-95

navigator.geolocation.getCurrentPosition(pos=>{

userLat=pos.coords.latitude
userLon=pos.coords.longitude

update()

})


/* update page */

function update(){

const dateStr=document.getElementById("datePicker").value

if(!dateStr) return

const date=new Date(dateStr)

drawVisibility(date)


/* hijri */

const h=gregorianToHijri(date)

document.getElementById("hijriDate").innerHTML=
`${h.day} ${hijriMonths[h.month-1]} ${h.year} AH`


/* horizon visibility */

if(typeof horizonVisibility==="function"){

const visible=horizonVisibility(date,userLat,userLon)

const status=document.getElementById("status")

status.className="status"

if(visible){

status.classList.add("visible")
status.innerHTML="Crescent may be visible within your horizon."

}

else{

status.classList.add("notvisible")
status.innerHTML="Crescent not expected to be visible."

}

}


/* forecast */

if(typeof forecastNextMonth==="function"){

const f=forecastNextMonth(userLat,userLon)

if(f){

document.getElementById("forecast").innerHTML=

"Observation night: "+
f.observation.toDateString()+
"<br>First day of next month: "+
f.start.toDateString()

}

}

}


/* initialize */

const today=new Date()

document.getElementById("datePicker").value=
today.toISOString().split("T")[0]

document
.getElementById("datePicker")
.addEventListener("change",update)

update()

</script>

</body>
</html>
