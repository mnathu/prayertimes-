<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>iOS‑Style Moon Phase & Illumination with Hijri Date</title>

<style>
  body { font-family: system-ui, Arial; margin: 32px; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background: #eee; }
</style>
</head>

<body>

<h2>iOS‑Style Moon Illumination (20 minutes after sunset)</h2>

<label>Select Gregorian date:
  <input type="date" id="dateInput">
</label>
<button onclick="run()">Run</button>

<div style="margin:20px 0;">
  <p><strong>Julian Date:</strong> <span id="jdOut"></span></p>
  <p><strong>Hijri Date:</strong> <span id="hijriOut"></span></p>
</div>

<table>
<thead>
<tr>
  <th>City</th>
  <th>Sunset (UTC)</th>
  <th>+20 min (UTC)</th>
  <th>Illumination %</th>
  <th>Phase Name</th>
  <th>Elongation (°)</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script>
// ===================== Updated City List w/ UTC Offsets =====================
// Offsets are for March 2026 (DST in effect in North America)
const CITIES = [
  // USA
  { name:"Minneapolis, MN", lat:44.9778, lon:-93.2650, utcOffsetHours:-5 }, // CDT
  { name:"Orlando, FL",     lat:28.5383, lon:-81.3792, utcOffsetHours:-4 }, // EDT
  { name:"New York, NY",    lat:40.7128, lon:-74.0060, utcOffsetHours:-4 }, // EDT
  { name:"Chicago, IL",     lat:41.8781, lon:-87.6298, utcOffsetHours:-5 }, // CDT
  { name:"Houston, TX",     lat:29.7604, lon:-95.3698, utcOffsetHours:-5 }, // CDT
  { name:"Phoenix, AZ",     lat:33.4484, lon:-112.0740, utcOffsetHours:-7 }, // MST (no DST)
  { name:"Los Angeles, CA", lat:34.0522, lon:-118.2437, utcOffsetHours:-7 }, // PDT
  { name:"Denver, CO",      lat:39.7392, lon:-104.9903, utcOffsetHours:-6 }, // MDT
  { name:"Miami, FL",       lat:25.7617, lon:-80.1918, utcOffsetHours:-4 }, // EDT
  { name:"Seattle, WA",     lat:47.6062, lon:-122.3321, utcOffsetHours:-7 }, // PDT

  // CANADA
  { name:"Toronto, ON",     lat:43.6532, lon:-79.3832, utcOffsetHours:-4 }, // EDT
  { name:"Vancouver, BC",   lat:49.2827, lon:-123.1207, utcOffsetHours:-7 } // PDT
];

// Return a UTC Date corresponding to "local noon" for the city on the given Gregorian date
function getLocalNoonUTC(gDate, utcOffsetHrs) {
  // Build local noon in UTC using offset: local 12:00 = UTC (12 - offset)
  const utcHr = (12 - utcOffsetHrs + 24) % 24;
  return new Date(Date.UTC(gDate.getUTCFullYear(), gDate.getUTCMonth(), gDate.getUTCDate(), utcHr, 0, 0));
}

// === Utility to format HH:MM UTC ===
function fmtHMUTC(d){ return d ? d.toISOString().substring(11,16) : "—"; }

// === Main — compute both: (1) Local Noon "iOS-style daily %", (2) +20 min after sunset ===
function run(){
  const v=document.getElementById("dateInput").value;
  if(!v){ alert("Pick a date first."); return; }

  const gDate=new Date(v+"T00:00:00Z");

  // Julian for Gregorian input (just to show JD)
  const jd = jdFromDate(gDate);
  document.getElementById("jdOut").textContent = jd.toFixed(5);

  // Hijri civil (Kuwaiti algorithm)
  const hij = gregToHijri(gDate);
  document.getElementById("hijriOut").textContent = `${hij.hDay}/${hij.hMonth}/${hij.hYear} AH`;

  const tbody=document.getElementById("results");
  tbody.innerHTML="";

  CITIES.forEach(city=>{
    // (A) iOS-style daily illumination at local noon (Minneapolis shows 5%→2%→0%→2%→5%)
    const localNoonUTC = getLocalNoonUTC(gDate, city.utcOffsetHours);
    const jdNoon = jdFromDate(localNoonUTC);
    const illumNoon = illuminationFraction(jdNoon);             // fraction (0..1)
    const elongNoon = elongationDeg(jdNoon);
    const phaseNoon = phaseName(illumNoon, elongNoon);

    // (B) Optionally still compute +20 min after sunset (for curiosity)
    const sunset = sunsetUTC(gDate, city.lat, city.lon);
    const t20 = sunset ? new Date(sunset.getTime() + 20*60000) : null;
    const jd20 = t20 ? jdFromDate(t20) : null;
    const illum20 = jd20 ? illuminationFraction(jd20) : NaN;

    tbody.innerHTML += `
      <tr>
        <td>${city.name}</td>
        <td>${sunset? fmtHMUTC(sunset): "—"}</td>
        <td>${t20? fmtHMUTC(t20): "—"}</td>
        <td>
          <div><strong>${(illumNoon*100).toFixed(1)}%</strong> (local noon)</div>
          ${t20? `<div style="font-size:0.9em;color:#666;">${(illum20*100).toFixed(1)}% (+20m after sunset)</div>` : ``}
        </td>
        <td>${phaseNoon}</td>
        <td>${elongNoon.toFixed(2)}</td>
      </tr>`;
  });
}
</script>

</body>
</html>
