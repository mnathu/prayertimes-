<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crescent Visibility Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#f5f6fb;
}

nav{
background:#0A166C;
color:white;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
}

#controls{
background:white;
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

#map{
height:65vh;
width:100%;
}

.legend{
margin-top:10px;
display:flex;
justify-content:center;
gap:20px;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
display:inline-block;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

</style>
</head>

<body>

<nav style="background:#0A166C; color:white; padding:10px; text-align:center;">
  <a href="index.html" style="color:white; margin:0 10px; text-decoration:none;">Home</a>
  <a href="annual.html" style="color:white; margin:0 10px; text-decoration:none;">Annual Timetable</a>
  <a href="qibla.html" style="color:white; margin:0 10px; text-decoration:none;">Qibla Locator</a>
  <a href="halal.html" style="color:white; margin:0 10px; text-decoration:none;">Halal Guide</a>
  <a href="hilal-cities.html" style="color:white; margin:0 10px; text-decoration:none;">Moonsighting</a>
</nav>

<div id="controls">

<h3>Crescent Visibility (North America)</h3>

<input type="date" id="dateInput">

<div class="legend">
<div><span class="dot green"></span>Likely Visible</div>
<div><span class="dot yellow"></span>Borderline</div>
<div><span class="dot red"></span>Unlikely</div>
</div>

</div>

<div id="map"></div>

<script>

/* ===============================
CITY LIST (Your Original)
=============================== */

const CITIES = [

{ name:"Minneapolis, MN", lat:44.9778, lon:-93.2650 },
{ name:"Orlando, FL", lat:28.5383, lon:-81.3792 },
{ name:"New York, NY", lat:40.7128, lon:-74.0060 },
{ name:"Chicago, IL", lat:41.8781, lon:-87.6298 },
{ name:"Houston, TX", lat:29.7604, lon:-95.3698 },
{ name:"Phoenix, AZ", lat:33.4484, lon:-112.0740 },
{ name:"Los Angeles, CA", lat:34.0522, lon:-118.2437 },
{ name:"Denver, CO", lat:39.7392, lon:-104.9903 },
{ name:"Miami, FL", lat:25.7617, lon:-80.1918 },
{ name:"Seattle, WA", lat:47.6062, lon:-122.3321 },
{ name:"Toronto, ON", lat:43.6532, lon:-79.3832 },
{ name:"Vancouver, BC", lat:49.2827, lon:-123.1207 }

]

/* ===============================
MAP
=============================== */

const map=L.map("map").setView([39,-98],4)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map)

let layer=L.layerGroup().addTo(map)

/* ===============================
ASTRONOMY HELPERS
=============================== */

const d2r=d=>d*Math.PI/180
const norm360=x=>(x%360+360)%360

function julian(date){
return date/86400000+2440587.5
}

function sunLong(jd){

const T=(jd-2451545)/36525
const L0=norm360(280.46646+36000.76983*T)
const M=norm360(357.52911+35999.05029*T)

return L0+
1.914602*Math.sin(d2r(M))+
0.019993*Math.sin(d2r(2*M))

}

function moonLong(jd){

const T=(jd-2451545)/36525

const L1=norm360(218.316+481267.8813*T)
const M=norm360(134.963+477198.8676*T)

return norm360(
L1+
6.289*Math.sin(d2r(M))
)

}

function elongation(jd){

let s=sunLong(jd)
let m=moonLong(jd)

let E=Math.abs(norm360(m-s))
if(E>180)E=360-E

return E

}

function illumination(jd){

return (1-Math.cos(d2r(elongation(jd))))/2

}

/* ===============================
VISIBILITY MODEL
=============================== */

function visibility(illum,el){

const pct=illum*100

if(pct>=1 && el>=10)
return {color:"green",text:"Likely Visible"}

if(pct>=0.5 && el>=7)
return {color:"yellow",text:"Borderline"}

return {color:"red",text:"Unlikely"}

}

/* ===============================
DRAW MAP
=============================== */

function draw(date){

layer.clearLayers()

const jd=julian(date)

CITIES.forEach(city=>{

let illum=illumination(jd)
let el=elongation(jd)

let vis=visibility(illum,el)

L.circleMarker([city.lat,city.lon],{

radius:8,
color:vis.color,
fillOpacity:0.8

})
.addTo(layer)
.bindPopup(

"<b>"+city.name+"</b><br>"+
"Illumination: "+(illum*100).toFixed(2)+"%<br>"+
"Elongation: "+el.toFixed(2)+"°<br>"+
"Visibility: "+vis.text

)

})

}

/* ===============================
DATE CONTROL
=============================== */

const picker=document.getElementById("dateInput")

const today=new Date()

picker.value=today.toISOString().split("T")[0]

draw(today)

picker.addEventListener("change",()=>{
draw(new Date(picker.value))
})

</script>

</body>
</html>
