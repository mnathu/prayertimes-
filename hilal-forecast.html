<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>iOS‑Style Moon Phase & Illumination with Hijri Date</title>

<style>
  body { font-family: system-ui, Arial; margin: 32px; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background: #eee; }
</style>
</head>

<body>

<h2>iOS‑Style Moon Illumination (20 minutes after sunset)</h2>

<label>Select Gregorian date:
  <input type="date" id="dateInput">
</label>
<button onclick="run()">Run</button>

<div style="margin:20px 0;">
  <p><strong>Julian Date:</strong> <span id="jdOut"></span></p>
  <p><strong>Hijri Date:</strong> <span id="hijriOut"></span></p>
</div>

<table>
<thead>
<tr>
  <th>City</th>
  <th>Sunset (UTC)</th>
  <th>+20 min (UTC)</th>
  <th>Illumination %</th>
  <th>Phase Name</th>
  <th>Elongation (°)</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script>
// ======================= City List =========================
const CITIES = [
  { name:"New York, NY", lat:40.7128, lon:-74.0060 },
  { name:"Chicago, IL", lat:41.8781, lon:-87.6298 },
  { name:"Houston, TX", lat:29.7604, lon:-95.3698 },
  { name:"Phoenix, AZ", lat:33.4484, lon:-112.0740 },
  { name:"Los Angeles, CA", lat:34.0522, lon:-118.2437 },
  { name:"Denver, CO", lat:39.7392, lon:-104.9903 },
  { name:"Miami, FL", lat:25.7617, lon:-80.1918 },
  { name:"Seattle, WA", lat:47.6062, lon:-122.3321 }
];

const d2r = d => d*Math.PI/180;
const r2d = r => r*180/Math.PI;
const norm360 = x => (x % 360 + 360) % 360;

// ======================= Julian Date =========================
function jdFromDate(d){
  const y=d.getUTCFullYear(), m=d.getUTCMonth()+1;
  const day=d.getUTCDate() + (d.getUTCHours()+d.getUTCMinutes()/60)/24;
  let Y=y, M=m;
  if(M<=2){ Y--; M+=12; }
  const A=Math.floor(Y/100);
  const B=2 - A + Math.floor(A/4);
  return Math.floor(365.25*(Y+4716)) +
         Math.floor(30.6001*(M+1)) +
         day + B - 1524.5;
}

function gmstHours(jd){
  return (18.697374558 + 24.06570982441908*(jd - 2451545.0)) % 24;
}

// ======================= Sun Position =========================
function sunLong(jd){
  const T=(jd-2451545)/36525;
  const L0=norm360(280.46646 + 36000.76983*T);
  const M =norm360(357.52911 + 35999.05029*T);
  const C =(1.914602-0.004817*T)*Math.sin(d2r(M))
         +(0.019993-0.000101*T)*Math.sin(d2r(2*M))
         +0.000289*Math.sin(d2r(3*M));
  return L0+C;
}

function sunEquatorial(jd){
  const lam=sunLong(jd);
  const eps=23.439;
  const dec = r2d(Math.asin(Math.sin(d2r(eps))*Math.sin(d2r(lam))));
  const RA  = r2d(Math.atan2(Math.sin(d2r(lam))*Math.cos(d2r(eps)), Math.cos(d2r(lam))));
  return {RA, dec};
}

// ======================= Moon Position =========================
function moonLong(jd){
  const T=(jd-2451545)/36525;
  const L1=norm360(218.316 + 481267.8813*T);
  const M =norm360(134.963 + 477198.8676*T);
  const Ms=norm360(357.529 + 35999.050*T);
  return norm360(
    L1 +
    6.289*Math.sin(d2r(M)) +
    1.274*Math.sin(d2r(2*L1 - M - Ms)) +
    0.658*Math.sin(d2r(2*L1)) +
    0.214*Math.sin(d2r(2*M)) +
    0.110*Math.sin(d2r(L1))
  );
}

function moonEquatorial(jd){
  const lam=moonLong(jd);
  const eps=23.439;
  const dec = r2d(Math.asin(Math.sin(d2r(eps))*Math.sin(d2r(lam))));
  const RA  = r2d(Math.atan2(Math.sin(d2r(lam))*Math.cos(d2r(eps)), Math.cos(d2r(lam))));
  return {RA, dec};
}

// ======================= Altitude Calculation =========================
function altitude(jd,lat,lon,RAdeg,decdeg){
  const GMST = gmstHours(jd);
  const LST  = GMST + lon/15;
  const HA   = norm360(LST*15 - RAdeg);
  const latr = d2r(lat), decr=d2r(decdeg), har=d2r(HA);

  return r2d(Math.asin(
    Math.sin(latr)*Math.sin(decr)
    + Math.cos(latr)*Math.cos(decr)*Math.cos(har)
  ));
}

function sunAltitude(jd,lat,lon){
  const {RA,dec}=sunEquatorial(jd);
  return altitude(jd,lat,lon,RA,dec);
}

// ======================= Sunset =========================
function sunsetUTC(date, lat, lon){
  const N=Math.floor(
    (Date.UTC(date.getUTCFullYear(),date.getUTCMonth(),date.getUTCDate())
     - Date.UTC(date.getUTCFullYear(),0,0))/86400000
  );
  const lngHour = lon/15;
  const t = N + (18 - lngHour)/24;

  const M=(0.9856*t) - 3.289;
  const L=norm360(M + 1.916*Math.sin(d2r(M)) + 0.020*Math.sin(d2r(2*M)) + 282.634);

  const RA=norm360(r2d(Math.atan(0.91764*Math.tan(d2r(L)))));
  const Lq=Math.floor(L/90)*90, RAq=Math.floor(RA/90)*90;
  const RAh=(RA + (Lq - RAq))/15;

  const sinDec=0.39782*Math.sin(d2r(L));
  const cosDec=Math.cos(Math.asin(sinDec));

  const cosH=(Math.cos(d2r(90.833)) - sinDec*Math.sin(d2r(lat)))
              / (cosDec*Math.cos(d2r(lat)));

  if(cosH>1) return null;
  const H=r2d(Math.acos(cosH))/15;

  let UT=(H + RAh - 0.06571*t - 6.622) % 24;
  if(UT<0) UT+=24;

  const hr=Math.floor(UT);
  const mn=Math.floor((UT - hr)*60);

  return new Date(Date.UTC(
    date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate(),
    hr, mn
  ));
}

// ======================= Illumination =========================
function elongationDeg(jd){
  const s=sunLong(jd), m=moonLong(jd);
  let E=Math.abs(norm360(m-s));
  if(E>180) E=360-E;
  return E;
}

function illuminationFraction(jd){
  return (1 - Math.cos(d2r(elongationDeg(jd)))) / 2;
}

// ======================= Phase Name =========================
function phaseName(illum, elong){
  if(illum < 0.01) return "New Moon";
  if(illum < 0.49 && elong < 90) return "Waxing Crescent";
  if(Math.abs(illum - 0.5) < 0.02 && elong < 90) return "First Quarter";
  if(illum < 0.99 && elong > 90 && elong < 180) return "Waxing Gibbous";
  if(illum > 0.99) return "Full Moon";
  if(illum < 0.99 && elong > 180 && elong < 270) return "Waning Gibbous";
  if(Math.abs(illum - 0.5) < 0.02 && elong > 180) return "Last Quarter";
  return "Waning Crescent";
}

// ======================= Hijri (Corrected) =========================
function gregToHijri(g){
  var day=g.getUTCDate(),
      month=g.getUTCMonth()+1,
      year=g.getUTCFullYear();

  var m=month, y=year;
  if(m<3){ y--; m+=12; }

  var a=Math.floor(y/100);
  var b=2 - a + Math.floor(a/4);

  var jd=Math.floor(365.25*(y+4716))
       + Math.floor(30.6001*(m+1))
       + day + b - 1524.5;

  var l = jd - 1948440 + 10632;
  var n = Math.floor((l - 1) / 10631);
  l = l - 10631*n + 354;

  var j = (Math.floor((10985 - l)/5316))* (Math.floor((50*l)/17719))
        + (Math.floor(l/5670))*(Math.floor((43*l)/15238));
  l = l - (Math.floor((30-j)/15))*(Math.floor((17719*j)/50))
        - (Math.floor(j/16))*(Math.floor((15238*j)/43)) + 29;

  var mHij = Math.floor((24*l)/709);
  var dHij = l - Math.floor((709*mHij)/24);
  var yHij = 30*n + j - 30;

  return { hDay:dHij, hMonth:mHij, hYear:yHij };
}

// ======================= MAIN =========================
function run(){
  const v=document.getElementById("dateInput").value;
  if(!v){ alert("Pick a date first."); return; }

  const date=new Date(v+"T00:00:00Z");
  const jd = jdFromDate(date);
  document.getElementById("jdOut").textContent = jd.toFixed(5);

  const hij = gregToHijri(date);
  document.getElementById("hijriOut").textContent =
    `${hij.hDay}/${hij.hMonth}/${hij.hYear} AH`;

  const tbody=document.getElementById("results");
  tbody.innerHTML="";

  CITIES.forEach(city=>{
    const ss=sunsetUTC(date,city.lat,city.lon);

    if(!ss){
      tbody.innerHTML += `<tr>
        <td>${city.name}</td><td colspan="5">Sun does not set</td>
      </tr>`;
      return;
    }

    const t20=new Date(ss.getTime() + 20*60000);
    const jd20 = jdFromDate(t20);

    const illum = illuminationFraction(jd20);
    const elong = elongationDeg(jd20);
    const ph = phaseName(illum, elong);

    tbody.innerHTML += `
      <tr>
        <td>${city.name}</td>
        <td>${ss.toISOString().substring(11,16)}</td>
        <td>${t20.toISOString().substring(11,16)}</td>
        <td>${(illum*100).toFixed(1)}%</td>
        <td>${ph}</td>
        <td>${elong.toFixed(2)}</td>
      </tr>`;
  });
}

</script>

</body>
</html>
