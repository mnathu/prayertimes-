<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hilal Visibility Forecast | PrayerTimes</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f6f7fb;
}

/* header consistent with prayer pages */

header{
background:#1f2d3d;
color:white;
padding:16px;
text-align:center;
}

header h2{
margin:0;
font-size:20px;
}

header small{
opacity:.8;
}

/* controls */

#controls{
background:white;
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

#controls label{
font-weight:bold;
margin-right:6px;
}

#datePicker{
padding:6px;
font-size:14px;
}

/* map */

#map{
height:55vh;
width:100%;
}

/* legend */

.legend{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:10px;
font-size:13px;
}

.legend div{
display:flex;
align-items:center;
gap:5px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.orange{background:#f39c12}
.red{background:#e74c3c}

/* prediction box */

#prediction{
margin:10px auto;
max-width:600px;
padding:10px;
background:white;
border-radius:6px;
box-shadow:0 2px 4px rgba(0,0,0,.1);
font-size:14px;
}

/* mobile */

@media(max-width:600px){

header h2{
font-size:18px;
}

#map{
height:50vh;
}

}

</style>
</head>

<body>

<header>

<h2>Global Hilal Visibility</h2>
<small id="hijri"></small>

</header>

<div id="controls">

<label>Date:</label>
<input type="date" id="datePicker">

<div class="legend">

<div><span class="dot green"></span>Visible</div>
<div><span class="dot yellow"></span>Optical Aid</div>
<div><span class="dot orange"></span>Difficult</div>
<div><span class="dot red"></span>Not Visible</div>

</div>

</div>

<div id="map"></div>

<div id="prediction"></div>

<script>

/* ===========================
HILAL ENGINE v2.1
=========================== */

const RAD=Math.PI/180
const DEG=180/Math.PI

function rad(d){return d*RAD}
function deg(r){return r*DEG}

function julian(date){
return date/86400000+2440587.5
}

function sunPosition(jd){

let n=jd-2451545

let L=(280.46+0.9856474*n)%360
let g=(357.528+0.9856003*n)%360

let lambda=
L+
1.915*Math.sin(rad(g))+
0.020*Math.sin(rad(2*g))

let epsilon=23.439

let RA=Math.atan2(
Math.cos(rad(epsilon))*Math.sin(rad(lambda)),
Math.cos(rad(lambda))
)

let dec=Math.asin(
Math.sin(rad(epsilon))*Math.sin(rad(lambda))
)

return{RA,dec}

}

function moonPosition(jd){

let n=jd-2451550.1

let L=(218.316+13.176396*n)%360
let M=(134.963+13.064993*n)%360
let F=(93.272+13.229350*n)%360

let lon=L+6.289*Math.sin(rad(M))
let lat=5.128*Math.sin(rad(F))

let epsilon=23.439

let RA=Math.atan2(
Math.sin(rad(lon))*Math.cos(rad(epsilon)),
Math.cos(rad(lon))
)

let dec=Math.asin(
Math.sin(rad(lat))*Math.cos(rad(epsilon))+
Math.cos(rad(lat))*Math.sin(rad(epsilon))*Math.sin(rad(lon))
)

return{RA,dec}

}

function sunsetHourAngle(lat,dec){

let latR=rad(lat)

let cosH=
(
Math.sin(rad(-0.833))-
Math.sin(latR)*Math.sin(dec)
)/
(
Math.cos(latR)*Math.cos(dec)
)

if(cosH>1)return null

return Math.acos(cosH)

}

function altitude(lat,dec,H){

return Math.asin(
Math.sin(rad(lat))*Math.sin(dec)+
Math.cos(rad(lat))*Math.cos(dec)*Math.cos(H)
)

}

function elongation(sun,moon){

return Math.acos(
Math.sin(sun.dec)*Math.sin(moon.dec)+
Math.cos(sun.dec)*Math.cos(moon.dec)*
Math.cos(sun.RA-moon.RA)
)

}

function odehQ(alt,elong){

let altD=deg(alt)
let elD=deg(elong)

if(elD<=0)return-999

return altD-(11.837+6.322*Math.log(elD))

}

function classify(Q){

if(Q>0.216)return"A"
if(Q>-0.014)return"B"
if(Q>-0.160)return"C"
return"D"

}

function generateVisibility(date){

let jd=julian(date)

let grid=[]

for(let lat=-60;lat<=60;lat+=5){

for(let lon=-180;lon<=180;lon+=5){

let jdLocal=jd+lon/360

let sun=sunPosition(jdLocal)
let moon=moonPosition(jdLocal)

let H=sunsetHourAngle(lat,sun.dec)

if(!H)continue

let alt=altitude(lat,moon.dec,H)

alt-=rad(0.566)

let el=elongation(sun,moon)

let Q=odehQ(alt,el)

let cat=classify(Q)

grid.push({lat,lon,cat})

}

}

return grid

}

function generateCurves(grid){

let naked=[]
let optical=[]

for(let lon=-180;lon<=180;lon+=5){

let bestA=null
let bestB=null

grid.forEach(p=>{

if(Math.abs(p.lon-lon)<3){

if(p.cat==="A"&&!bestA)bestA=p
if(p.cat==="B"&&!bestB)bestB=p

}

})

if(bestA)naked.push([bestA.lat,bestA.lon])
if(bestB)optical.push([bestB.lat,bestB.lon])

}

return{naked,optical}

}

/* ===========================
MAP
=========================== */

const map=L.map("map").setView([20,0],2)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map)

const visibilityLayer=L.layerGroup().addTo(map)
const curveLayer=L.layerGroup().addTo(map)

/* draw */

function drawHilal(date){

visibilityLayer.clearLayers()
curveLayer.clearLayers()

let grid=generateVisibility(date)

grid.forEach(p=>{

let color="red"

if(p.cat==="A")color="green"
if(p.cat==="B")color="yellow"
if(p.cat==="C")color="orange"

L.circleMarker([p.lat,p.lon],{
radius:3,
color:color,
fillOpacity:.7
}).addTo(visibilityLayer)

})

let curves=generateCurves(grid)

L.polyline(curves.naked,{color:"green",weight:2}).addTo(curveLayer)
L.polyline(curves.optical,{color:"yellow",weight:2}).addTo(curveLayer)

}

/* hijri date */

function hijri(date){

let jd=date/86400000+2440587.5

let l=jd-1948440+10632
let n=Math.floor((l-1)/10631)
l=l-10631*n+354

let j=
(Math.floor((10985-l)/5316))*
(Math.floor((50*l)/17719))+
(Math.floor(l/5670))*
(Math.floor((43*l)/15238))

l=l-
(Math.floor((30-j)/15))*
(Math.floor((17719*j)/50))-
(Math.floor(j/16))*
(Math.floor((15238*j)/43))+29

let m=Math.floor((24*l)/709)
let d=l-Math.floor((709*m)/24)
let y=30*n+j-30

return d+" / "+m+" / "+y

}

/* user location */

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

L.marker([lat,lon]).addTo(map)
.bindPopup("Your Location")

})

/* date control */

const picker=document.getElementById("datePicker")

let today=new Date()

picker.valueAsDate=today

update()

picker.addEventListener("change",update)

function update(){

let d=new Date(picker.value)

drawHilal(d)

document.getElementById("hijri").innerHTML=
"Hijri Date: "+hijri(d)

document.getElementById("prediction").innerHTML=
"Global crescent visibility forecast based on astronomical modeling."

}

</script>

</body>
</html>
