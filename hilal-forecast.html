<!DOCTYPE html>
<html>
<head>
  <title>Hilal Prediction — FCNA/ISNA Method</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .card { max-width: 600px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
    h2 { margin-top: 0; }
    input { width: 100%; padding: 6px; margin: 6px 0; }
    button { padding: 10px 16px; background: #1e88e5; color: white; border: none; cursor: pointer; }
    .result { margin-top: 20px; padding: 15px; background: #f3f3f3; border-radius: 6px; }
  </style>
</head>

<body>

<div class="card">
  <h2>Hilal Prediction (Moonsighting.com / FCNA Criteria)</h2>

  <p>Enter the astronomical parameters *at local sunset somewhere on Earth*:</p>

  <label>Moon Altitude (degrees):</label>
  <input type="number" id="alt" step="0.1" placeholder="e.g. 7.2">

  <label>Elongation (degrees):</label>
  <input type="number" id="elong" step="0.1" placeholder="e.g. 10.5">

  <button onclick="predictHilal()">Predict</button>

  <div id="output" class="result" style="display:none;"></div>
</div>

<script>
function predictHilal() {
    const alt = parseFloat(document.getElementById('alt').value);
    const elong = parseFloat(document.getElementById('elong').value);

    if (isNaN(alt) || isNaN(elong)) {
        alert("Please enter valid numbers for altitude and elongation.");
        return;
    }

    // FCNA/ISNA criteria (Moonsighting.com)
    const meetsCriteria = (alt >= 5 && elong >= 8);

    let result = "";
    if (meetsCriteria) {
        result = `
        <strong>Result:</strong><br>
        The hilal <strong>is considered visible</strong> somewhere on Earth based on<br>
        <strong>Altitude ≥ 5° and Elongation ≥ 8°</strong>.<br><br>
        → <strong>Tomorrow</strong> will be the 1st of the new Islamic month.
        `;
    } else {
        result = `
        <strong>Result:</strong><br>
        The hilal <strong>does NOT meet</strong> the visibility thresholds:<br>
        altitude must be ≥ 5° and elongation must be ≥ 8°.<br><br>
        → Add one more day: <strong>the day after tomorrow</strong> is the 1st of the new month.
        `;
    }

    const box = document.getElementById('output');
    box.style.display = 'block';
    box.innerHTML = result;
}
</script>

</body>
</html>
