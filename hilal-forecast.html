<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hilal Visibility Forecast | PrayerTimes</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f6f7fb;
}

/* header consistent with prayer pages */

header{
background:#1f2d3d;
color:white;
padding:16px;
text-align:center;
}

header h2{
margin:0;
font-size:20px;
}

header small{
opacity:.8;
}

/* controls */

#controls{
background:white;
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

#controls label{
font-weight:bold;
margin-right:6px;
}

#datePicker{
padding:6px;
font-size:14px;
}

/* map */

#map{
height:55vh;
width:100%;
}

/* legend */

.legend{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:10px;
font-size:13px;
}

.legend div{
display:flex;
align-items:center;
gap:5px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.orange{background:#f39c12}
.red{background:#e74c3c}

/* prediction box */

#prediction{
margin:10px auto;
max-width:600px;
padding:10px;
background:white;
border-radius:6px;
box-shadow:0 2px 4px rgba(0,0,0,.1);
font-size:14px;
}

/* mobile */

@media(max-width:600px){

header h2{
font-size:18px;
}

#map{
height:50vh;
}

}

</style>
</head>

<body>

<header>

<h2>Global Hilal Visibility</h2>
<small id="hijri"></small>

</header>

<div id="controls">

<label>Date:</label>
<input type="date" id="datePicker">

<div class="legend">

<div><span class="dot green"></span>Visible</div>
<div><span class="dot yellow"></span>Optical Aid</div>
<div><span class="dot orange"></span>Difficult</div>
<div><span class="dot red"></span>Not Visible</div>

</div>

</div>

<div id="map"></div>

<div id="prediction"></div>

<script>

/* ===============================
HILAL ENGINE v2.2 (FIXED)
=============================== */

const RAD=Math.PI/180
const DEG=180/Math.PI

function rad(d){return d*RAD}
function deg(r){return r*DEG}

function julian(date){
return date/86400000+2440587.5
}

/* -----------------------------
SUN POSITION
----------------------------- */

function sunPosition(jd){

let n=jd-2451545

let L=(280.46+0.9856474*n)%360
let g=(357.528+0.9856003*n)%360

let lambda=
L+
1.915*Math.sin(rad(g))+
0.020*Math.sin(rad(2*g))

let epsilon=23.439

let RA=Math.atan2(
Math.cos(rad(epsilon))*Math.sin(rad(lambda)),
Math.cos(rad(lambda))
)

let dec=Math.asin(
Math.sin(rad(epsilon))*Math.sin(rad(lambda))
)

return{RA,dec}

}

/* -----------------------------
MOON POSITION
----------------------------- */

function moonPosition(jd){

let D=jd-2451545

let L=(218.316+13.176396*D)%360
let M=(134.963+13.064993*D)%360
let F=(93.272+13.229350*D)%360

let lon=L+6.289*Math.sin(rad(M))
let lat=5.128*Math.sin(rad(F))

let epsilon=23.439

let RA=Math.atan2(
Math.sin(rad(lon))*Math.cos(rad(epsilon)),
Math.cos(rad(lon))
)

let dec=Math.asin(
Math.sin(rad(lat))*Math.cos(rad(epsilon))+
Math.cos(rad(lat))*Math.sin(rad(epsilon))*Math.sin(rad(lon))
)

return{RA,dec}

}

/* -----------------------------
SUNSET HOUR ANGLE
----------------------------- */

function sunsetHourAngle(lat,dec){

let latR=rad(lat)

let cosH=
(
Math.sin(rad(-0.833))-
Math.sin(latR)*Math.sin(dec)
)/
(
Math.cos(latR)*Math.cos(dec)
)

if(cosH>1)return null

return Math.acos(cosH)

}

/* -----------------------------
ALTITUDE
----------------------------- */

function altitude(lat,dec,H){

return Math.asin(
Math.sin(rad(lat))*Math.sin(dec)+
Math.cos(rad(lat))*Math.cos(dec)*Math.cos(H)
)

}

/* -----------------------------
ELONGATION
----------------------------- */

function elongation(sun,moon){

return Math.acos(
Math.sin(sun.dec)*Math.sin(moon.dec)+
Math.cos(sun.dec)*Math.cos(moon.dec)*
Math.cos(sun.RA-moon.RA)
)

}

/* -----------------------------
ODEH Q
----------------------------- */

function odehQ(alt,elong){

let altD=deg(alt)
let elD=deg(elong)

return altD-(11.837+6.322*Math.log(elD))

}

function classify(Q){

if(Q>0.216)return"A"
if(Q>-0.014)return"B"
if(Q>-0.160)return"C"
return"D"

}

/* -----------------------------
MAIN VISIBILITY GRID
----------------------------- */

function generateVisibility(date){

let jd=julian(date)

let grid=[]

for(let lat=-60;lat<=60;lat+=5){

for(let lon=-180;lon<=180;lon+=5){

let jdLocal=jd+lon/360

let sun=sunPosition(jdLocal)
let moon=moonPosition(jdLocal)

let Hsun=sunsetHourAngle(lat,sun.dec)

if(!Hsun)continue

/* moon hour angle at sunset */

let Hmoon=Hsun+(sun.RA-moon.RA)

let alt=altitude(lat,moon.dec,Hmoon)

/* refraction correction */

alt-=rad(0.566)

let el=elongation(sun,moon)

let Q=odehQ(alt,el)

let cat=classify(Q)

grid.push({lat,lon,cat})

}

}

return grid

}
</script>

</body>
</html>
