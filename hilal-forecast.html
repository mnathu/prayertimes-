<!DOCTYPE html>
<html>
<head>
  <title>Automatic Hilal Prediction (No API)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; }
    th { background: #eee; }
  </style>
</head>

<body>

<h2>Automatic Hilal Prediction for U.S. Cities<br>FCNA / Moonsighting.com Criteria</h2>
<p>Hilal is “visible” if: <strong>Altitude ≥ 5° AND Elongation ≥ 8°</strong></p>

<label>Select date: <input type="date" id="obsDate"></label>
<button onclick="runPrediction()">Run Prediction</button>

<table id="resultsTable">
  <thead>
    <tr>
      <th>City</th>
      <th>Altitude (°)</th>
      <th>Elongation (°)</th>
      <th>Visibility</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
// ---------------------
// CITY LIST
// ---------------------
const cities = [
  { name: "New York, NY", lat: 40.7128, lon: -74.0060 },
  { name: "Chicago, IL",  lat: 41.8781, lon: -87.6298 },
  { name: "Houston, TX",  lat: 29.7604, lon: -95.3698 },
  { name: "Phoenix, AZ",  lat: 33.4484, lon: -112.0740 },
  { name: "Los Angeles, CA", lat: 34.0522, lon: -118.2437 },
  { name: "Denver, CO", lat: 39.7392, lon: -104.9903 },
  { name: "Miami, FL", lat: 25.7617, lon: -80.1918 },
  { name: "Seattle, WA", lat: 47.6062, lon: -122.3321 }
];

// ---------------------
// TIME & ANGLE UTILITIES
// ---------------------
function toRadians(d) { return d * Math.PI/180; }
function toDegrees(r) { return r * 180/Math.PI; }

// Julian Day
function jdFromDate(date) {
    let y = date.getUTCFullYear();
    let m = date.getUTCMonth() + 1;
    let d = date.getUTCDate() + 
            (date.getUTCHours() + date.getUTCMinutes()/60) / 24;
    if (m <= 2) { y -= 1; m += 12; }
    const A = Math.floor(y/100);
    const B = 2 - A + Math.floor(A/4);
    return Math.floor(365.25*(y+4716)) + 
           Math.floor(30.6001*(m+1)) + d + B - 1524.5;
}

// Normalize 0-360°
function norm360(d) {
    return (d % 360 + 360) % 360;
}

// ---------------------
// SUN POSITION (approx Meeus)
// ---------------------
function sunEclipticLongitude(jd) {
    const T = (jd - 2451545.0)/36525;
    const L0 = norm360(280.46646 + 36000.76983*T);
    const M = norm360(357.52911 + 35999.05029*T);
    const C = (1.914602 - 0.004817*T) * Math.sin(toRadians(M))
            + (0.019993 - 0.000101*T) * Math.sin(toRadians(2*M))
            + 0.000289 * Math.sin(toRadians(3*M));
    return L0 + C;
}

// ---------------------
// MOON POSITION (simplified Meeus)
// ---------------------
function moonEclipticLongitude(jd) {
    const T = (jd - 2451545.0)/36525;
    const L1 = norm360(218.316 + 481267.8813*T);
    const M  = norm360(134.963 + 477198.8676*T);  // Moon anomaly
    const Ms = norm360(357.529 + 35999.050*T);   // Sun anomaly
    // Main periodic terms
    const lon = L1 
      + 6.289 * Math.sin(toRadians(M))
      + 1.274 * Math.sin(toRadians(2*L1 - M - Ms))
      + 0.658 * Math.sin(toRadians(2*L1)) 
      + 0.214 * Math.sin(toRadians(2*M))
      + 0.110 * Math.sin(toRadians(L1));
    return norm360(lon);
}

// ---------------------
// LOCAL SUNSET (simple formula)
// ---------------------
function computeSunset(lat, lon, date) {
    const N = Math.floor((Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) 
                        - Date.UTC(date.getFullYear(),0,0)) / 86400000);
    const lngHour = lon/15;
    const t = N + ((18 - lngHour) / 24);
    const M = (0.9856*t) - 3.289;
    const L = norm360(M + 1.916*Math.sin(toRadians(M)) + 
                         0.020*Math.sin(toRadians(2*M)) + 282.634);
    const RA = norm360(toDegrees(Math.atan(0.91764*Math.tan(toRadians(L)))));
    const Lquadrant  = Math.floor(L/90) * 90;
    const RAquadrant = Math.floor(RA/90) * 90;
    const RAcorrected = (RA + (Lquadrant - RAquadrant))/15;

    const sinDec = 0.39782 * Math.sin(toRadians(L));
    const cosDec = Math.cos(Math.asin(sinDec));

    const cosH = (Math.cos(toRadians(90.833)) - (sinDec*Math.sin(toRadians(lat)))) /
                 (cosDec*Math.cos(toRadians(lat)));
    if (cosH > 1) return null; // no sunset

    const H = toDegrees(Math.acos(cosH))/15;
    const UT = (H + RAcorrected - 0.06571*t - 6.622) % 24;

    return new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate(), UT));
}

// ---------------------
// ALTITUDE CALC
// ---------------------
function moonAltitudeAtTime(jd, lat, lon) {
    // VERY simplified local altitude model:
    // Convert ecliptic longitudes to RA/Dec (approx)
    const lam = moonEclipticLongitude(jd);
    const beta = 0; // ignoring lunar latitude for simplicity

    const eps = 23.439; // obliquity
    const sinDec = Math.sin(toRadians(beta))*Math.cos(toRadians(eps)) +
                   Math.cos(toRadians(beta))*Math.sin(toRadians(eps))*Math.sin(toRadians(lam));
    const dec = toDegrees(Math.asin(sinDec));

    const sinRA = Math.sin(toRadians(lam))*Math.cos(toRadians(eps)) - 
                  Math.tan(toRadians(beta))*Math.sin(toRadians(eps));
    const cosRA = Math.cos(toRadians(lam));
    const RA = toDegrees(Math.atan2(sinRA, cosRA));

    // Hour angle
    const GMST = (18.697374558 + 24.06570982441908*(jd - 2451545.0)) % 24;
    const LST = GMST + lon/15;
    const HA = norm360((LST*15 - RA));

    const altitude = toDegrees(
        Math.asin(
            Math.sin(toRadians(lat))*Math.sin(toRadians(dec)) +
            Math.cos(toRadians(lat))*Math.cos(toRadians(dec))*Math.cos(toRadians(HA))
        )
    );
    return altitude;
}

// ---------------------
// FCNA RULE
// ---------------------
function isHilalVisible(alt, elong) {
    return (alt >= 5 && elong >= 8);
}

// ---------------------
// MAIN LOOP
// ---------------------
function runPrediction() {
    const userDate = document.getElementById("obsDate").value;
    if (!userDate) { alert("Pick a date."); return; }

    const date = new Date(userDate+"T00:00:00");

    const tbody = document.querySelector("#resultsTable tbody");
    tbody.innerHTML = "";

    cities.forEach(city => {

        const sunset = computeSunset(city.lat, city.lon, date);
        if (!sunset) return;

        const jd = jdFromDate(sunset);

        const sunLon  = sunEclipticLongitude(jd);
        const moonLon = moonEclipticLongitude(jd);

        const elong = Math.abs(norm360(moonLon - sunLon));
        const alt   = moonAltitudeAtTime(jd, city.lat, city.lon);

        const visible = isHilalVisible(alt, elong) ? "Visible" : "Not Visible";

        tbody.innerHTML += `
          <tr>
            <td>${city.name}</td>
            <td>${alt.toFixed(2)}</td>
            <td>${elong.toFixed(2)}</td>
            <td><strong>${visible}</strong></td>
          </tr>
        `;
    });
}
</script>

</body>
</html>
