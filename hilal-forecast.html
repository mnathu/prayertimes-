<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crescent Visibility Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#f5f6fb;
}

nav{
background:#0A166C;
color:white;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
}

#controls{
background:white;
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

#map{
height:65vh;
width:100%;
}

.legend{
margin-top:10px;
display:flex;
justify-content:center;
gap:20px;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
display:inline-block;
}

.green{background:#2ecc71}
.yellow{background:#f1c40f}
.red{background:#e74c3c}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="annual.html">Annual Timetable</a>
<a href="qibla.html">Qibla Locator</a>
<a href="halal.html">Halal Guide</a>
</nav>

<div id="controls">

<h3>Crescent Visibility (North America)</h3>

<input type="date" id="dateInput">

<div class="legend">
<div><span class="dot green"></span>Likely Visible</div>
<div><span class="dot yellow"></span>Borderline</div>
<div><span class="dot red"></span>Unlikely</div>
</div>

</div>

<div id="map"></div>

<script>

/* ===============================
CITY LIST
=============================== */

const CITIES=[

{ name:"Minneapolis",lat:44.9778,lon:-93.2650 },
{ name:"Chicago",lat:41.8781,lon:-87.6298 },
{ name:"Houston",lat:29.7604,lon:-95.3698 },
{ name:"Phoenix",lat:33.4484,lon:-112.0740 },
{ name:"Los Angeles",lat:34.0522,lon:-118.2437 },
{ name:"Denver",lat:39.7392,lon:-104.9903 },
{ name:"Seattle",lat:47.6062,lon:-122.3321 },
{ name:"Miami",lat:25.7617,lon:-80.1918 },
{ name:"New York",lat:40.7128,lon:-74.0060 },
{ name:"Toronto",lat:43.6532,lon:-79.3832 },
{ name:"Vancouver",lat:49.2827,lon:-123.1207 }

]

/* ===============================
MAP
=============================== */

const map=L.map("map").setView([39,-98],4)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}
).addTo(map)

let layer=L.layerGroup().addTo(map)

/* ===============================
MATH HELPERS
=============================== */

const d2r=d=>d*Math.PI/180
const r2d=r=>r*180/Math.PI
const norm360=x=>(x%360+360)%360

/* ===============================
JULIAN DATE
=============================== */

function julian(date){
return date/86400000+2440587.5
}

/* ===============================
SUN LONGITUDE
=============================== */

function sunLong(jd){

const T=(jd-2451545)/36525

const L0=norm360(280.46646+36000.76983*T)

const M=norm360(357.52911+35999.05029*T)

return L0+
1.914602*Math.sin(d2r(M))+
0.019993*Math.sin(d2r(2*M))

}

/* ===============================
MOON LONGITUDE
=============================== */

function moonLong(jd){

const T=(jd-2451545)/36525

const L1=norm360(218.316+481267.8813*T)
const M=norm360(134.963+477198.8676*T)

return norm360(
L1+
6.289*Math.sin(d2r(M))
)

}

/* ===============================
ELONGATION
=============================== */

function elongation(jd){

let s=sunLong(jd)
let m=moonLong(jd)

let E=Math.abs(norm360(m-s))

if(E>180)E=360-E

return E

}

/* ===============================
ILLUMINATION
=============================== */

function illumination(jd){
return (1-Math.cos(d2r(elongation(jd))))/2
}

/* ===============================
SUNSET
=============================== */

function sunsetUTC(date,lat,lon){

const N=Math.floor(
(Date.UTC(date.getUTCFullYear(),date.getUTCMonth(),date.getUTCDate())
-Date.UTC(date.getUTCFullYear(),0,0))/86400000
)

const lngHour=lon/15
const t=N+(18-lngHour)/24

const M=(0.9856*t)-3.289

const L=norm360(
M+
1.916*Math.sin(d2r(M))+
0.020*Math.sin(d2r(2*M))+
282.634
)

const RA=r2d(Math.atan(0.91764*Math.tan(d2r(L))))/15

const sinDec=0.39782*Math.sin(d2r(L))
const cosDec=Math.cos(Math.asin(sinDec))

const cosH=(Math.cos(d2r(90.833))-sinDec*Math.sin(d2r(lat)))
/(cosDec*Math.cos(d2r(lat)))

if(cosH>1)return null

const H=r2d(Math.acos(cosH))/15

let UT=(H+RA-0.06571*t-6.622)%24

if(UT<0)UT+=24

return new Date(Date.UTC(
date.getUTCFullYear(),
date.getUTCMonth(),
date.getUTCDate(),
Math.floor(UT),
Math.floor((UT%1)*60)
))

}

/* ===============================
MOONSET (APPROX)
=============================== */

function moonsetUTC(date,lat,lon){

const jd=julian(date)

const lag=elongation(jd)*4

const sunset=sunsetUTC(date,lat,lon)

if(!sunset)return null

return new Date(sunset.getTime()+lag*60000)

}

/* ===============================
VISIBILITY MODEL
=============================== */

function visibility(lag,el,illum){

const pct=illum*100

if(lag>45 && el>10 && pct>1)
return {color:"green",text:"Likely Visible"}

if(lag>25 && el>7 && pct>0.5)
return {color:"yellow",text:"Borderline"}

return {color:"red",text:"Unlikely"}

}

/* ===============================
DRAW MAP
=============================== */

function draw(date){

layer.clearLayers()

CITIES.forEach(city=>{

const jd=julian(date)

const illum=illumination(jd)
const el=elongation(jd)

const sunset=sunsetUTC(date,city.lat,city.lon)
const moonset=moonsetUTC(date,city.lat,city.lon)

let lag=0

if(sunset && moonset)
lag=(moonset-sunset)/60000

const vis=visibility(lag,el,illum)

L.circleMarker([city.lat,city.lon],{

radius:8,
color:vis.color,
fillOpacity:0.8

})
.addTo(layer)
.bindPopup(

"<b>"+city.name+"</b><br>"+
"Moonset Lag: "+lag.toFixed(0)+" min<br>"+
"Elongation: "+el.toFixed(2)+"°<br>"+
"Illumination: "+(illum*100).toFixed(2)+"%<br>"+
"Visibility: "+vis.text

)

})

}

/* ===============================
DATE CONTROL
=============================== */

const picker=document.getElementById("dateInput")

const today=new Date()

picker.value=today.toISOString().split("T")[0]

draw(today)

picker.addEventListener("change",()=>{
draw(new Date(picker.value))
})

</script>

</body>
</html>
