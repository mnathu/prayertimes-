<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>iOS-Style Moon Illumination with Hijri Date</title>

<style>
  body { font-family: system-ui, Arial; margin: 32px; }
  table { border-collapse: collapse; width: 100%; margin-top: 25px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background:#f2f2f2; }
</style>
</head>

<body>

<h2>iOS‑Style Moon Illumination (Local‑Noon Method)</h2>

<label>Select Date:
  <input type="date" id="dateInput">
</label>
<button onclick="run()">Run</button>

<div style="margin:20px 0;">
  <p><strong>Julian Date:</strong> <span id="jdOut"></span></p>
  <p><strong>Hijri Date:</strong> <span id="hijriOut"></span></p>
</div>

<table>
<thead>
<tr>
  <th>City</th>
  <th>Sunset (UTC)</th>
  <th>+20 min (UTC)</th>
  <th>Illumination at Local Noon</th>
  <th>iOS‑phase</th>
  <th>Elongation (°)</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script>
// ======================================================
// DST RULES (USA + Canada)
// ======================================================
// • DST begins SECOND SUNDAY OF MARCH
// • DST ends   FIRST SUNDAY OF NOVEMBER
function isDST_NA(gDate) {
  const year = gDate.getUTCFullYear();

  function secondSundayOfMarch(y) {
    const d = new Date(Date.UTC(y,2,1)); // March 1
    // Day of week 0=Sun..6=Sat
    const day = d.getUTCDay();
    const offset = (7 - day) % 7;
    return new Date(Date.UTC(y,2,1+offset+7));
  }
  function firstSundayOfNov(y) {
    const d = new Date(Date.UTC(y,10,1)); // Nov 1
    const day = d.getUTCDay();
    const offset = (7 - day) % 7;
    return new Date(Date.UTC(y,10,1+offset));
  }
  const begin = secondSundayOfMarch(year);
  const end   = firstSundayOfNov(year);
  return (gDate >= begin && gDate < end);
}

// ======================================================
// CITIES (base UTC offsets BEFORE DST)
// ======================================================
const CITIES_BASE = [
  // USA
  { name:"Minneapolis, MN", lat:44.9778, lon:-93.2650, baseUTC:-6 },
  { name:"Orlando, FL",     lat:28.5383, lon:-81.3792, baseUTC:-5 },
  { name:"New York, NY",    lat:40.7128, lon:-74.0060, baseUTC:-5 },
  { name:"Chicago, IL",     lat:41.8781, lon:-87.6298, baseUTC:-6 },
  { name:"Houston, TX",     lat:29.7604, lon:-95.3698, baseUTC:-6 },
  { name:"Phoenix, AZ",     lat:33.4484, lon:-112.0740, baseUTC:-7 }, // NO DST
  { name:"Los Angeles, CA", lat:34.0522, lon:-118.2437, baseUTC:-8 },
  { name:"Denver, CO",      lat:39.7392, lon:-104.9903, baseUTC:-7 },
  { name:"Miami, FL",       lat:25.7617, lon:-80.1918, baseUTC:-5 },
  { name:"Seattle, WA",     lat:47.6062, lon:-122.3321, baseUTC:-8 },

  // CANADA
  { name:"Toronto, ON",     lat:43.6532, lon:-79.3832, baseUTC:-5 },
  { name:"Vancouver, BC",   lat:49.2827, lon:-123.1207, baseUTC:-8 }
];

function getUTCOffset(city, gDate) {
  // Phoenix (AZ) never uses DST
  if (city.name.includes("Phoenix")) return city.baseUTC;

  // All others observe NA DST
  return city.baseUTC + (isDST_NA(gDate) ? 1 : 0);
}

// ======================================================
// HELPER MATH
// ======================================================
const d2r = d => d*Math.PI/180;
const r2d = r => r*180/Math.PI;
const norm360 = x => (x % 360 + 360) % 360;

// ======================================================
// JULIAN DATE
// ======================================================
function jdFromDate(d){
  const y=d.getUTCFullYear();
  const m=d.getUTCMonth()+1;
  const day=d.getUTCDate() + (d.getUTCHours()+d.getUTCMinutes()/60)/24;
  let Y=y, M=m;
  if(M<=2){ Y--; M+=12; }
  const A=Math.floor(Y/100);
  const B=2 - A + Math.floor(A/4);
  return Math.floor(365.25*(Y+4716))
       + Math.floor(30.6001*(M+1))
       + day + B - 1524.5;
}
function gmstHours(jd){
  return (18.697374558 + 24.06570982441908*(jd - 2451545.0)) % 24;
}

// ======================================================
// SUN POSITION
// ======================================================
function sunLong(jd){
  const T=(jd-2451545)/36525;
  const L0=norm360(280.46646 + 36000.76983*T);
  const M =norm360(357.52911 + 35999.05029*T);
  const C =(1.914602-0.004817*T)*Math.sin(d2r(M))
         +(0.019993-0.000101*T)*Math.sin(d2r(2*M))
         +0.000289*Math.sin(d2r(3*M));
  return L0+C;
}
function sunEquatorial(jd){
  const lam=sunLong(jd);
  const eps=23.439;
  const dec=r2d(Math.asin(Math.sin(d2r(eps))*Math.sin(d2r(lam))));
  const RA=r2d(Math.atan2(Math.sin(d2r(lam))*Math.cos(d2r(eps)),
                          Math.cos(d2r(lam))));
  return {RA, dec};
}

// ======================================================
// MOON POSITION
// (Meeus truncated series — matches phase behavior adequately)
// ======================================================
function moonLong(jd){
  const T=(jd-2451545)/36525;
  const L1=norm360(218.316 + 481267.8813*T);
  const M =norm360(134.963 + 477198.8676*T);
  const Ms=norm360(357.529 + 35999.050*T);

  return norm360(
    L1 +
    6.289*Math.sin(d2r(M)) +
    1.274*Math.sin(d2r(2*L1 - M - Ms)) +
    0.658*Math.sin(d2r(2*L1)) +
    0.214*Math.sin(d2r(2*M)) +
    0.110*Math.sin(d2r(L1))
  );
}
function moonEquatorial(jd){
  const lam=moonLong(jd);
  const eps=23.439;
  const dec=r2d(Math.asin(Math.sin(d2r(eps))*Math.sin(d2r(lam))));
  const RA =r2d(Math.atan2(Math.sin(d2r(lam))*Math.cos(d2r(eps)),
                           Math.cos(d2r(lam))));
  return {RA, dec};
}

// ======================================================
// ALTITUDE + SUNSET
// ======================================================
function altitude(jd,lat,lon,RAdeg,decdeg){
  const GMST=gmstHours(jd);
  const LST = GMST + lon/15;
  const HA  = norm360(LST*15 - RAdeg);

  return r2d(Math.asin(
    Math.sin(d2r(lat))*Math.sin(d2r(decdeg)) +
    Math.cos(d2r(lat))*Math.cos(d2r(decdeg))*Math.cos(d2r(HA))
  ));
}
function sunAltitude(jd,lat,lon){
  const {RA,dec}=sunEquatorial(jd);
  return altitude(jd,lat,lon,RA,dec);
}

function sunsetUTC(date, lat, lon){
  const N=Math.floor(
    (Date.UTC(date.getUTCFullYear(),date.getUTCMonth(),date.getUTCDate())
    - Date.UTC(date.getUTCFullYear(),0,0))/86400000
  );

  const lngHour=lon/15;
  const t=N + (18 - lngHour)/24;

  const M=(0.9856*t) - 3.289;
  const L=norm360(M + 1.916*Math.sin(d2r(M)) + 0.020*Math.sin(d2r(2*M)) + 282.634);

  const RA=norm360(r2d(Math.atan(0.91764*Math.tan(d2r(L)))));
  const Lq=Math.floor(L/90)*90, RAq=Math.floor(RA/90)*90;
  const RAh=(RA + (Lq - RAq))/15;

  const sinDec=0.39782*Math.sin(d2r(L));
  const cosDec=Math.cos(Math.asin(sinDec));

  const cosH=(Math.cos(d2r(90.833)) - sinDec*Math.sin(d2r(lat)))
             /(cosDec*Math.cos(d2r(lat)));

  if(cosH>1) return null;

  const H=r2d(Math.acos(cosH))/15;

  let UT=(H + RAh - 0.06571*t - 6.622) % 24;
  if(UT < 0) UT += 24;

  return new Date(Date.UTC(
    date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate(),
    Math.floor(UT), Math.floor((UT%1)*60)
  ));
}

function fmtHMUTC(d){ return d ? d.toISOString().substring(11,16) : "—"; }

// ======================================================
// ILLUMINATION (iOS method: illumination = (1 - cos θ)/2)
// θ = Sun–Moon phase angle (elongation)
// ======================================================
function elongationDeg(jd){
  const s=sunLong(jd), m=moonLong(jd);
  let E=Math.abs(norm360(m - s));
  if(E>180) E=360 - E;
  return E;
}
function illuminationFraction(jd){
  return (1 - Math.cos(d2r(elongationDeg(jd)))) / 2;
}

function phaseName(illum, elong){
  if(illum < 0.01) return "New Moon";
  if(illum < 0.49 && elong < 90) return "Waxing Crescent";
  if(Math.abs(illum - 0.5) < 0.02 && elong < 90) return "First Quarter";
  if(illum < 0.99 && elong > 90 && elong < 180) return "Waxing Gibbous";
  if(illum > 0.99) return "Full Moon";
  if(illum < 0.99 && elong > 180 && elong < 270) return "Waning Gibbous";
  if(Math.abs(illum - 0.5) < 0.02 && elong > 180) return "Last Quarter";
  return "Waning Crescent";
}

// ======================================================
// HIJRI CIVIL TABULAR
// ======================================================
function gregToHijri(g){
  var day=g.getUTCDate(),
      month=g.getUTCMonth()+1,
      year=g.getUTCFullYear();

  var m=month, y=year;
  if(m < 3){ y--; m += 12; }

  var a=Math.floor(y/100);
  var b=2 - a + Math.floor(a/4);

  var jd=Math.floor(365.25*(y+4716))
         + Math.floor(30.6001*(m+1))
         + day + b - 1524.5;

  var l = jd - 1948440 + 10632;
  var n = Math.floor((l - 1)/10631);
  l = l - 10631*n + 354;

  var j = (Math.floor((10985 - l)/5316)) * (Math.floor((50*l)/17719))
        + (Math.floor(l/5670)) * (Math.floor((43*l)/15238));

  l = l - (Math.floor((30 - j)/15))*(Math.floor((17719*j)/50))
        - (Math.floor(j/16))*(Math.floor((15238*j)/43)) + 29;

  var mHij = Math.floor((24*l)/709);
  var dHij = l - Math.floor((709*mHij)/24);
  var yHij = 30*n + j - 30;

  return {hDay:dHij, hMonth:mHij, hYear:yHij};
}

// ======================================================
// LOCAL-NOON CALCULATION (iOS-like)
// ======================================================
function localNoonUTC(gDate, utcOffset) {
  const utcHr = (12 - utcOffset + 24) % 24;
  return new Date(Date.UTC(
    gDate.getUTCFullYear(),
    gDate.getUTCMonth(),
    gDate.getUTCDate(),
    utcHr, 0, 0
  ));
}

// ======================================================
// MAIN
// ======================================================
function run(){
  const v=document.getElementById("dateInput").value;
  if(!v){ alert("Choose a date"); return; }

  const gDate=new Date(v+"T00:00:00Z");

  const jd = jdFromDate(gDate);
  document.getElementById("jdOut").textContent = jd.toFixed(5);

  const hij = gregToHijri(gDate);
  document.getElementById("hijriOut").textContent =
    `${hij.hDay}/${hij.hMonth}/${hij.hYear} AH`;

  const tbody=document.getElementById("results");
  tbody.innerHTML="";

  CITIES_BASE.forEach(city=>{
    const utcOffset = getUTCOffset(city, gDate);

    // (1) local noon (iOS daily illumination)
    const lnUTC = localNoonUTC(gDate, utcOffset);
    const jdLn  = jdFromDate(lnUTC);
    const illumLn = illuminationFraction(jdLn);
    const elongLn = elongationDeg(jdLn);
    const phase   = phaseName(illumLn, elongLn);

    // (2) sunset + 20 min illum
    const ss = sunsetUTC(gDate, city.lat, city.lon);
    const t20 = ss ? new Date(ss.getTime() + 20*60000) : null;
    const illum20 = t20 ? illuminationFraction(jdFromDate(t20)) : null;

    tbody.innerHTML += `
      <tr>
        <td>${city.name}</td>
        <td>${fmtHMUTC(ss)}</td>
        <td>${fmtHMUTC(t20)}</td>
        <td><strong>${(illumLn*100).toFixed(1)}%</strong></td>
        <td>${phase}</td>
        <td>${elongLn.toFixed(2)}</td>
      </tr>`;
  });
}

// ======================================================
// AUTO‑LOAD TODAY'S DATE & RUN
// ======================================================
window.onload = function() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById("dateInput").value = `${yyyy}-${mm}-${dd}`;
  run();
};
</script>

</body>
</html>
