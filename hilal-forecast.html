<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Hilal Visibility Forecast</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f7f7f7;
}

header{
padding:15px;
text-align:center;
font-weight:600;
}

.controls{
text-align:center;
margin:10px;
}

#map{
height:65vh;
}

.info{
text-align:center;
font-size:14px;
margin-top:5px;
}

</style>

</head>

<body>

<header>Hilal Visibility Forecast</header>

<div class="controls">
<input type="date" id="dateInput">
</div>

<div class="info" id="info"></div>

<div id="map"></div>

<script>

/* ---------- HIJRI USING INTL ---------- */

function getHijri(date){

const formatter =
new Intl.DateTimeFormat('en-TN-u-ca-islamic',{
day:'numeric',
month:'numeric',
year:'numeric'
});

const parts=formatter.formatToParts(date);

let h={};

parts.forEach(p=>{
if(p.type==="day") h.d=parseInt(p.value);
if(p.type==="month") h.m=parseInt(p.value);
if(p.type==="year") h.y=parseInt(p.value);
});

return h;

}

/* ---------- FIND NEXT HIJRI 29 ---------- */

function setNextHijri29(){

const today=new Date();

for(let i=0;i<60;i++){

let d=new Date(today);
d.setDate(today.getDate()+i);

let h=getHijri(d);

if(h.d===29){

dateInput.value=
d.toISOString().split("T")[0];

return;

}

}

}

/* ---------- MOON AGE ---------- */

function julian(date){
return date.getTime()/86400000 + 2440587.5;
}

function lastConjunction(date){

const k=Math.floor(
(julian(date)-2451550.1)/29.530588853
);

const J=
2451550.09765+
29.530588853*k;

return new Date((J-2440587.5)*86400000);

}

function moonAge(date){

const conj=lastConjunction(date);

return (date-conj)/3600000;

}

/* ---------- MOONSET LAG ---------- */

function moonsetLag(date,lat){

const age=moonAge(date);

return Math.max(5,20+age-lat/3);

}

/* ---------- VISIBILITY SCORE ---------- */

function visibilityScore(date,lat){

const age=moonAge(date);
const lag=moonsetLag(date,lat);

let score=0;

if(age>18) score++;
if(age>24) score++;

if(lag>20) score++;
if(lag>40) score++;

return score;

}

/* ---------- MAP ---------- */

const map=L.map("map").setView([20,0],2);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:6}
).addTo(map);

const layer=L.layerGroup().addTo(map);

/* ---------- VISIBILITY CURVE ---------- */

function drawCurve(date){

let points=[];

for(let lon=-180;lon<=180;lon+=2){

for(let lat=60;lat>=-60;lat-=1){

let score=visibilityScore(date,lat);

if(score>=3){

points.push([lat,lon]);
break;

}

}

}

if(points.length>0){

L.polyline(points,{
color:"#2ecc71",
weight:3
}).addTo(layer);

}

}

/* ---------- UPDATE ---------- */

function update(){

layer.clearLayers();

const date=new Date(dateInput.value);

drawCurve(date);

/* info display */

const h=getHijri(date);

const age=moonAge(date).toFixed(1);
const lag=moonsetLag(date,30).toFixed(0);

info.innerHTML=
`Gregorian: ${date.toDateString()}
 | Hijri: ${h.d}-${h.m}-${h.y}
 | Moon Age: ${age} hr
 | Moonset Lag: ${lag} min`;

}

/* ---------- INIT ---------- */

const dateInput=document.getElementById("dateInput");
const info=document.getElementById("info");

dateInput.addEventListener("change",update);

setNextHijri29();
update();

</script>

</body>
</html>
